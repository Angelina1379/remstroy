<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сообщения | BuildHouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#ffb547;
    --primary-dark:#f39a1f;
    --accent:#ff8c42;
    --sidebar:#0b1220;
    --bg:#f4f7fb;
    --white:#fff;
    --border:#e6ebf2;
    --text:#1b2430;
    --muted:#7d8896;
    --shadow:0 10px 35px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
a{text-decoration:none;}

.dashboard{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
    position:fixed;top:0;left:0;width:260px;height:100vh;
    background:var(--sidebar);padding:30px 20px;
    display:flex;flex-direction:column;z-index:1000;
}
.logo h2{color:var(--primary);font-size:28px;font-weight:900;}
.logo p{color:#8f9aad;margin-top:6px;font-size:14px;}
.menu{display:flex;flex-direction:column;gap:8px;margin-top:34px;flex-grow:1;}
.menu a{display:flex;align-items:center;gap:12px;color:#aab2c5;padding:14px 18px;border-radius:14px;transition:.25s;font-weight:500;}
.menu a .m-ic{font-size:19px;}
.menu a:hover{background:#1d2638;color:white;}
.menu .active{background:var(--primary);color:#111;font-weight:700;}
#logoutBtn{width:100%;border:none;padding:14px;border-radius:14px;background:#1d2638;color:#ff9b9b;font-weight:700;cursor:pointer;font-family:inherit;font-size:15px;margin-top:auto;}
#logoutBtn:hover{background:#26344a;}

/* CHAT MAIN */
.chat-main{
    margin-left:260px;width:calc(100% - 260px);height:100vh;
    display:flex;flex-direction:column;overflow:hidden;
    background:#eef1f6;
}

.chat-header{
    flex-shrink:0;background:white;border-bottom:1px solid var(--border);
    padding:18px 28px;display:flex;align-items:center;gap:16px;min-height:84px;
}
.burger{display:none;background:none;border:none;font-size:26px;cursor:pointer;color:#111;}
.chat-user{display:flex;align-items:center;gap:14px;}
.avatar{
    width:52px;height:52px;border-radius:50%;
    background:linear-gradient(135deg,var(--primary),#ffe1a2);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:18px;color:#111;
}
.chat-user h3{font-size:18px;}
.chat-user p{color:var(--muted);font-size:14px;}
.status-dot{width:9px;height:9px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;}

/* MESSAGES */
.messages-container{
    flex:1;min-height:0;overflow-y:auto;padding:28px;
    display:flex;flex-direction:column;gap:12px;
}
.message{
    max-width:68%;padding:13px 17px;border-radius:18px;line-height:1.5;
    word-break:break-word;box-shadow:0 3px 12px rgba(0,0,0,.05);
}
.message.client{align-self:flex-end;background:var(--primary);color:#111;border-bottom-right-radius:6px;}
.message.manager{align-self:flex-start;background:white;border-bottom-left-radius:6px;}
.message-time{font-size:11px;opacity:.6;margin-top:7px;text-align:right;}
.chat-image{margin-top:8px;max-width:240px;border-radius:14px;display:block;}
.file-box{margin-top:8px;background:rgba(255,255,255,.45);padding:10px;border-radius:12px;}
.file-box a{color:#1f5eff;font-weight:600;}
.message.client .file-box a{color:#7a4a00;}
.empty-chat{margin:auto;color:#8a95a5;font-size:17px;text-align:center;}

/* INPUT */
.file-preview{flex-shrink:0;background:white;padding:0 24px;color:#555;font-size:14px;}
.file-preview:not(:empty){padding:12px 24px;border-top:1px solid var(--border);}
.chat-input{
    flex-shrink:0;background:white;border-top:1px solid var(--border);
    padding:16px 20px;display:flex;align-items:center;gap:12px;
}
.chat-input input[type=text]{
    flex:1;border:none;background:#f4f7fb;border-radius:16px;
    padding:16px;font-family:inherit;font-size:15px;
}
.chat-input input[type=text]:focus{outline:none;box-shadow:0 0 0 3px rgba(255,181,71,.2);}
.attach-btn,#voiceBtn,#sendBtn{
    width:52px;height:52px;border:none;border-radius:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:20px;transition:.25s;
}
.attach-btn{background:#eef4ff;}
#voiceBtn{background:#eef4ff;}
#voiceBtn.recording{background:#ffe3e3;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
#sendBtn{background:var(--primary);}
#sendBtn:hover{background:var(--primary-dark);}
.attach-btn:hover,#voiceBtn:hover{transform:translateY(-2px);}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#d6dce5;border-radius:20px;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;}
.overlay.show{display:block;}

@media(max-width:1100px){
    .sidebar{transform:translateX(-100%);transition:.3s;}
    .sidebar.open{transform:translateX(0);}
    .chat-main{margin-left:0;width:100%;}
    .burger{display:block;}
}
@media(max-width:768px){
    .message{max-width:85%;}
}
</style>
</head>

<body>

<div class="dashboard">

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <h2>BuildHouse</h2>
            <p>Личный кабинет</p>
        </div>
        <nav class="menu">
            <a href="client-cabinet.html"><span class="m-ic">🏠</span> Главная</a>
            <a href="orders.html"><span class="m-ic">📦</span> Заказы</a>
            <a class="active"><span class="m-ic">💬</span> Сообщения</a>
            <a href="calendar.html"><span class="m-ic">📅</span> Календарь</a>
            <a href="documents.html"><span class="m-ic">📄</span> Документы</a>
            <a href="settings.html"><span class="m-ic">⚙️</span> Настройки</a>
        </nav>
        <button id="logoutBtn">Выйти</button>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="chat-main">

        <div class="chat-header">
            <button class="burger" id="burger">☰</button>
            <div class="chat-user">
                <div class="avatar">M</div>
                <div>
                    <h3>Менеджер проекта</h3>
                    <p><span class="status-dot"></span>BuildHouse · на связи</p>
                </div>
            </div>
        </div>

        <div id="messagesContainer" class="messages-container">
            <div class="empty-chat">Загрузка сообщений...</div>
        </div>

        <div id="filePreview" class="file-preview"></div>

        <div class="chat-input">
            <label class="attach-btn">
                📎
                <input type="file" id="fileInput" hidden>
            </label>
            <input type="text" id="messageInput" placeholder="Введите сообщение...">
            <button id="voiceBtn" title="Голосовое">🎤</button>
            <button id="sendBtn" title="Отправить">➤</button>
        </div>

    </main>

</div>


<script type="module">
import { auth, db } from "./js/firebase.js";
import {
    collection, query, orderBy, onSnapshot, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
    signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ===== БЕСПЛАТНОЕ ХРАНЕНИЕ ===== */
const IMGBB_KEY="bd8a728ac270a8d6fecbd03734d77c8e";
const MAX_INLINE=700*1024;
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}
const blobToBase64=fileToBase64;
async function uploadToImgBB(file){
    // ImgBB надёжнее всего принимает base64-строку без префикса
    const b64=await fileToBase64(file);
    const pure=b64.indexOf(",")>=0 ? b64.split(",")[1] : b64;
    const form=new FormData();
    form.append("image",pure);
    let res,raw,data;
    try{
        res=await fetch("https://api.imgbb.com/1/upload?key="+encodeURIComponent(IMGBB_KEY),{method:"POST",body:form});
    }catch(netErr){
        throw new Error("Нет связи с api.imgbb.com (интернет/блокировка домена)");
    }
    raw=await res.text();
    try{ data=JSON.parse(raw); }catch(e){ throw new Error("Ответ ImgBB (код "+res.status+"): "+raw.slice(0,200)); }
    if(!data.success){
        const msg=data?.error?.message||JSON.stringify(data).slice(0,200);
        throw new Error("ImgBB (код "+res.status+"): "+msg);
    }
    return data.data.url;
}

const messagesContainer = document.getElementById("messagesContainer");
const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const fileInput = document.getElementById("fileInput");
const filePreview = document.getElementById("filePreview");
const voiceBtn = document.getElementById("voiceBtn");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;
let selectedFile = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

/* БУРГЕР */
const sidebar=document.getElementById("sidebar"), overlay=document.getElementById("overlay");
document.getElementById("burger").addEventListener("click",()=>{sidebar.classList.add("open");overlay.classList.add("show");});
overlay.addEventListener("click",()=>{sidebar.classList.remove("open");overlay.classList.remove("show");});

/* AUTH */
onAuthStateChanged(auth,(user)=>{
    if(!user){window.location.href="login.html";return;}
    currentUser=user;
    loadMessages(user.uid);
});

/* LOGOUT */
logoutBtn?.addEventListener("click",async()=>{await signOut(auth);window.location.href="login.html";});

/* LOAD MESSAGES */
function loadMessages(uid){
    const messagesRef=query(collection(db,"messages",uid,"items"),orderBy("time","asc"));
    onSnapshot(messagesRef,(snapshot)=>{
        messagesContainer.innerHTML="";
        if(snapshot.empty){
            messagesContainer.innerHTML='<div class="empty-chat">Сообщений пока нет.<br>Напишите менеджеру — он ответит здесь.</div>';
            return;
        }
        // собираем и сортируем сами по времени (надёжно: serverTime или clientTime)
        const msgs=[];
        snapshot.forEach((docSnap)=>{
            const m=docSnap.data();
            let t=m.time?.toMillis?m.time.toMillis():(m.time?.seconds?m.time.seconds*1000:null);
            if(t==null)t=m.clientTime||null; // пока сервер не проставил — берём время отправки
            msgs.push({m,t});
        });
        msgs.sort((a,b)=>{
            const ta=a.t==null?Date.now()+1:a.t;
            const tb=b.t==null?Date.now()+1:b.t;
            return ta-tb;
        });
        msgs.forEach(({m,t})=>{
            const div=document.createElement("div");
            div.className=`message ${m.sender==="client"?"client":"manager"}`;
            let html="";
            if(m.text) html+=`<div class="message-text">${m.text}</div>`;
            if(m.imageUrl) html+=`<img src="${m.imageUrl}" class="chat-image" alt="Изображение">`;
            if(m.fileUrl && !m.imageUrl) html+=`<div class="file-box"><a href="${m.fileUrl}" target="_blank">📎 ${m.fileName||"Файл"}</a></div>`;
            if(m.voiceUrl) html+=`<audio controls style="margin-top:8px;max-width:240px;"><source src="${m.voiceUrl}"></audio>`;
            const dt=t?new Date(t):new Date();
            html+=`<div class="message-time">${dt.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</div>`;
            div.innerHTML=html;
            messagesContainer.appendChild(div);
        });
        messagesContainer.scrollTop=messagesContainer.scrollHeight;
    },(error)=>{console.error("Ошибка Firestore:",error);});
}

/* FILE SELECT */
fileInput?.addEventListener("change",()=>{
    selectedFile=fileInput.files[0];
    if(!selectedFile)return;
    filePreview.innerHTML=`📎 ${selectedFile.name} <span style="color:#999;cursor:pointer;" id="clearFile">✕</span>`;
    document.getElementById("clearFile")?.addEventListener("click",()=>{
        selectedFile=null;fileInput.value="";filePreview.innerHTML="";
    });
});

/* SEND */
sendBtn?.addEventListener("click",async()=>{
    if(!currentUser)return;
    const text=messageInput.value.trim();
    if(!text && !selectedFile)return;

    let fileUrl="",imageUrl="",fileName="";
    try{
        if(selectedFile){
            const isImage=selectedFile.type.startsWith("image/");
            if(isImage){
                sendBtn.disabled=true;
                imageUrl=await uploadToImgBB(selectedFile);
                sendBtn.disabled=false;
            }else{
                if(selectedFile.size>MAX_INLINE){
                    alert("Файл слишком большой (макс. ~700 КБ). Фото можно больше — они идут в облако.");
                    return;
                }
                fileUrl=await fileToBase64(selectedFile);
                fileName=selectedFile.name;
            }
        }
        await addDoc(collection(db,"messages",currentUser.uid,"items"),{
            text,sender:"client",fileUrl,imageUrl,fileName,read:false,time:serverTimestamp(),clientTime:Date.now()
        });
        messageInput.value="";fileInput.value="";filePreview.innerHTML="";selectedFile=null;
    }catch(e){sendBtn.disabled=false;alert("Ошибка отправки: "+e.message);}
});

/* ENTER */
messageInput?.addEventListener("keydown",(e)=>{if(e.key==="Enter"){e.preventDefault();sendBtn.click();}});

/* VOICE — клик старт / клик стоп */
voiceBtn?.addEventListener("click",async()=>{
    if(!currentUser)return;
    if(isRecording){
        mediaRecorder.stop();
        isRecording=false;
        voiceBtn.classList.remove("recording");
        return;
    }
    try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder=new MediaRecorder(stream);
        audioChunks=[];
        mediaRecorder.ondataavailable=(e)=>audioChunks.push(e.data);
        mediaRecorder.onstop=async()=>{
            const blob=new Blob(audioChunks,{type:"audio/webm"});
            try{
                if(blob.size>MAX_INLINE){
                    alert("Голосовое слишком длинное (макс. ~30-40 сек). Запишите покороче.");
                }else{
                    const voiceUrl=await blobToBase64(blob);
                    await addDoc(collection(db,"messages",currentUser.uid,"items"),{
                        sender:"client",voiceUrl,read:false,time:serverTimestamp(),clientTime:Date.now()
                    });
                }
            }catch(e){alert("Ошибка записи: "+e.message);}
            stream.getTracks().forEach(t=>t.stop());
        };
        mediaRecorder.start();
        isRecording=true;
        voiceBtn.classList.add("recording");
    }catch(e){alert("Нет доступа к микрофону");}
});
</script>

</body>
</html>
