<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Сообщения | BuildHouse</title>

<link rel="stylesheet" href="css/messages.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div>

            <div class="logo">

                <h2>BuildHouse</h2>

                <p>Личный кабинет</p>

            </div>

            <nav class="menu">

                <a href="cabinet.html">
                    Главная
                </a>

                <a href="orders.html">
                    Заказы
                </a>

                <a class="active">
                    Сообщения
                </a>

                <a href="calendar.html">
                    Календарь
                </a>

                <a href="documents.html">
                    Документы
                </a>

                <a href="settings.html">
                    Настройки
                </a>
                
                <button id="logoutBtn">
                    Выйти
                </button>

            </nav>

        </div>


    </aside>

    <!-- CHAT -->

    <main class="messenger">

        <div class="chat-header">

            <div class="chat-user">

                <div
                    id="chatAvatar"
                    class="avatar"
                >
                    M
                </div>

                <div>

                    <h3>
                        Менеджер проекта
                    </h3>

                    <p>
                        BuildHouse
                    </p>

                </div>

            </div>

        </div>

        <div
            id="messagesContainer"
            class="messages-container"
        >

            <div class="empty-chat">
                Загрузка сообщений...
            </div>

        </div>

        <div
            id="filePreview"
            class="file-preview"
        ></div>

        <div class="chat-input">

            <label class="attach-btn">

                📎

                <input
                    type="file"
                    id="fileInput"
                    hidden
                >

            </label>

            <input
                type="text"
                id="messageInput"
                placeholder="Введите сообщение..."
            >

            <button id="voiceBtn">
                🎤
            </button>

            <button id="sendBtn">
                ➤
            </button>

        </div>

    </main>

</div>

<script
type="module"
src="js/messages.js">
</script>

</body>
</html>
