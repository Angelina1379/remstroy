<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Настройки | BuildHouse</title>

<link rel="stylesheet"
      href="css/settings.css">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div>

            <div class="logo">

                <h2>BuildHouse</h2>

                <p>Личный кабинет</p>

            </div>

            <nav class="menu">

                <a href="cabinet.html">
                    Главная
                </a>

                <a href="orders.html">
                    Заказы
                </a>

                <a href="messages.html">
                    Сообщения
                </a>

                <a href="calendar.html">
                    Календарь
                </a>

                <a href="documents.html">
                    Документы
                </a>

                <a class="active">
                    Настройки
                </a>

                <button id="logoutBtn">
                    Выйти
                </button>

            </nav>

        </div>

    </aside>

    <!-- CONTENT -->

    <main class="settings-page">

        <div class="page-header">

            <h1>
                Настройки профиля
            </h1>

            <p>
                Управление личными данными аккаунта
            </p>

        </div>

        <div class="settings-card">

            <h2>
                Личная информация
            </h2>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                        Имя
                    </label>

                    <input
                        type="text"
                        id="userName"
                        placeholder="Введите имя"
                    >

                </div>

                <div class="form-group">

                    <label>
                        Телефон
                    </label>

                    <input
                        type="text"
                        id="userPhone"
                        placeholder="+7 (___) ___-__-__"
                    >

                </div>

                <div class="form-group">

                    <label>
                        Email
                    </label>

                    <input
                        type="email"
                        id="userEmail"
                        placeholder="example@mail.ru"
                    >

                </div>

                <div class="form-group">

                    <label>
                        Адрес объекта
                    </label>

                    <input
                        type="text"
                        id="userAddress"
                        placeholder="Введите адрес"
                    >

                </div>

            </div>

        </div>

        <div class="settings-card">

            <h2>
                Безопасность
            </h2>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                        Новый пароль
                    </label>

                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Введите новый пароль"
                    >

                </div>

                <div class="form-group">

                    <label>
                        Подтверждение пароля
                    </label>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Повторите пароль"
                    >

                </div>

            </div>

        </div>

        <div class="settings-card">

            <h2>
                Уведомления
            </h2>

            <div class="checkbox-group">

                <label>

                    <input
                        type="checkbox"
                        id="emailNotifications"
                    >

                    Получать уведомления на Email

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="projectNotifications"
                    >

                    Уведомления об изменениях проекта

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="messageNotifications"
                    >

                    Уведомления о новых сообщениях

                </label>

            </div>

        </div>

        <button
            id="saveBtn"
            class="save-btn"
        >
            Сохранить изменения
        </button>

    </main>

</div>

<script
    type="module"
    src="js/settings.js">
</script>

</body>
</html>
