<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Заказы | BuildHouse</title>

<link rel="stylesheet" href="css/orders.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div>

            <div class="logo">

                <h2>BuildHouse</h2>

                <p>Личный кабинет</p>

            </div>

            <nav class="menu">

                <a href="cabinet.html">
                    Главная
                </a>

                <a class="active">
                    Заказы
                </a>

                <a href="messages.html">
                    Сообщения
                </a>

                <a href="calendar.html">
                    Календарь
                </a>

                <a href="documents.html">
                    Документы
                </a>

                <a href="settings.html">
                    Настройки
                </a>

                <button id="logoutBtn">
                    Выйти
                </button>

            </nav>

        </div>

    </aside>

    <main class="orders-page">

        <div class="page-header">

            <div>

                <h1>
                    Мои заказы
                </h1>

                <p>
                    Управление заявками и ремонтными работами
                </p>

            </div>

            <div class="header-actions">

                <button
                    id="newOrderBtn"
                    class="primary-btn"
                >
                    Подать заявку
                </button>

                <button
                    id="calculatorBtn"
                    class="secondary-btn"
                >
                    Рассчитать стоимость
                </button>

            </div>

        </div>

        <div class="filters">

            <input
                type="text"
                id="searchInput"
                placeholder="Поиск заказа..."
            >

            <select id="statusFilter">

                <option value="all">
                    Все статусы
                </option>

                <option value="new">
                    Новые
                </option>

                <option value="progress">
                    В работе
                </option>

                <option value="completed">
                    Завершённые
                </option>

                <option value="cancelled">
                    Отменённые
                </option>

            </select>

        </div>

        <div
            id="ordersList"
            class="orders-grid"
        >

            <!-- заказы -->

        </div>

    </main>

</div>
   
<!-- =====================================
     МОДАЛЬНОЕ ОКНО ЗАЯВКИ
===================================== -->

<div
    id="orderModal"
    class="modal"
>

    <div class="modal-content">

        <h2>
            Подать заявку
        </h2>

        <div class="form-group">

            <label>
                Вид работ
            </label>

            <input
                type="text"
                id="orderTitle"
                placeholder="Например: ремонт квартиры"
            >

        </div>

        <div class="form-group">

            <label>
                Адрес объекта
            </label>

            <input
                type="text"
                id="orderAddress"
                placeholder="Введите адрес"
            >

        </div>

        <button
            id="createOrderBtn"
            class="btn btn-primary"
        >
            Отправить заявку
        </button>

    </div>

</div>


<!-- =====================================
     КАЛЬКУЛЯТОР
===================================== -->

<div
    id="calculatorModal"
    class="modal"
>

    <div class="modal-content">

        <h2>
            Калькулятор ремонта
        </h2>

        <div class="form-group">

            <label>
                Площадь (м²)
            </label>

            <input
                type="number"
                id="calcArea"
            >

        </div>

        <div class="form-group">

            <label>
                Тип ремонта
            </label>

            <select id="calcType">

                <option value="5000">
                    Эконом
                </option>

                <option value="8000">
                    Стандарт
                </option>

                <option value="12000">
                    Премиум
                </option>

            </select>

        </div>

        <button
            id="calculateBtn"
            class="btn btn-blue"
        >
            Рассчитать
        </button>

        <div
            id="calcResult"
            class="calc-result"
        >
            0 ₽
        </div>

    </div>

</div>


<script
type="module"
src="js/orders.js">
</script>

</body>
</html>
