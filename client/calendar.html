<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Календарь | BuildHouse</title>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#ffb547;
    --primary-dark:#f39a1f;
    --accent:#ff8c42;
    --navy:#0b1220;
    --bg:#f4f7fb;
    --white:#fff;
    --border:#e6ebf2;
    --text:#1b2430;
    --muted:#7d8896;
    --shadow:0 10px 35px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
a{text-decoration:none;}
.dashboard{display:flex;min-height:100vh;}

/* SIDEBAR (клиентский) */
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:var(--navy);padding:30px 20px;display:flex;flex-direction:column;z-index:1000;}
.logo h2{color:var(--primary);font-size:28px;font-weight:900;}
.logo p{color:#8f9aad;margin-top:6px;font-size:14px;}
.menu{display:flex;flex-direction:column;gap:8px;margin-top:34px;flex-grow:1;}
.menu a{display:flex;align-items:center;gap:12px;color:#aab2c5;padding:14px 18px;border-radius:14px;transition:.25s;font-weight:500;}
.menu a .m-ic{font-size:19px;}
.menu a:hover{background:#1d2638;color:white;}
.menu .active{background:var(--primary);color:#111;font-weight:700;}
#logoutBtn{width:100%;border:none;padding:14px;border-radius:14px;background:#1d2638;color:#ff9b9b;font-weight:700;cursor:pointer;font-family:inherit;font-size:15px;margin-top:auto;}
#logoutBtn:hover{background:#26344a;}

/* MAIN */
.main-content{margin-left:260px;padding:35px;width:100%;}
.calendar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;gap:20px;}
.ct-left{display:flex;align-items:center;gap:16px;}
.calendar-top h1{font-size:32px;margin-bottom:6px;}
.calendar-top p{color:var(--muted);}
.burger{display:none;background:none;border:none;font-size:28px;cursor:pointer;color:#111;}

/* LAYOUT */
.calendar-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}
.calendar-wrapper{background:white;border-radius:24px;padding:26px;box-shadow:var(--shadow);}

/* легенда */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.lg{display:flex;align-items:center;gap:7px;font-size:13px;color:#555;font-weight:600;}
.lg .dot{width:12px;height:12px;border-radius:50%;}

/* DAY EVENTS */
.day-events{background:white;border-radius:24px;padding:26px;box-shadow:var(--shadow);position:sticky;top:20px;}
.day-events h2{font-size:20px;margin-bottom:6px;}
.day-events .day-sub{color:var(--muted);font-size:14px;margin-bottom:20px;}
.event-item{padding:16px;border-radius:16px;background:#f8f9fc;margin-bottom:12px;border-left:5px solid var(--primary);animation:evIn .4s ease backwards;}
.event-item strong{display:block;margin-bottom:8px;font-size:15px;}
.event-item p{color:#55606f;font-size:13px;margin-bottom:4px;}
.empty-day{text-align:center;color:var(--muted);padding:30px 10px;}
@keyframes evIn{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:translateX(0);}}

/* FullCalendar — компактный изящный вид */
.fc{font-family:'Inter',sans-serif;}
.fc .fc-toolbar.fc-header-toolbar{margin-bottom:18px;gap:10px;}
.fc .fc-toolbar-chunk{display:flex;align-items:center;gap:8px;}
.fc .fc-button-primary{background:#f3f5f9;color:#3a4452;border:none;border-radius:10px;font-weight:600;font-size:13px;text-transform:capitalize;padding:7px 13px;box-shadow:none;transition:.2s;}
.fc .fc-button-primary:hover{background:#e9edf3;color:#111;}
.fc .fc-button-primary:disabled{background:#f3f5f9;color:#c2c9d4;opacity:1;}
.fc .fc-button-primary:not(:disabled):active,
.fc .fc-button-active{background:var(--primary)!important;color:#111!important;box-shadow:none;}
.fc .fc-button-primary:focus{box-shadow:none!important;outline:none;}
.fc .fc-prev-button,.fc .fc-next-button{width:34px;height:34px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.fc .fc-today-button{background:var(--navy);color:#fff;border-radius:10px;font-size:12px;padding:7px 14px;}
.fc .fc-today-button:hover{background:#1d2638;color:#fff;}
.fc .fc-today-button:disabled{background:#e9edf3;color:#b8c0cc;}
.fc .fc-toolbar-title{font-size:18px;font-weight:700;white-space:nowrap;letter-spacing:-.2px;color:#1b2430;}
.fc .fc-toolbar-title::first-letter{text-transform:uppercase;}

.fc .fc-scrollgrid{border:none;}
.fc .fc-scrollgrid td,.fc .fc-scrollgrid th{border-color:#f0f2f6;}
.fc .fc-col-header-cell{background:transparent;}
.fc .fc-col-header-cell-cushion{color:#9aa3b0;font-weight:600;padding:10px 6px;text-transform:uppercase;font-size:11px;letter-spacing:.4px;}
.fc .fc-daygrid-day{transition:.15s;}
.fc .fc-daygrid-day:hover{background:#fff8eb;cursor:pointer;}
.fc .fc-daygrid-day.fc-day-today{background:#fff7e8;}
.fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number{background:var(--primary);color:#111;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:5px;font-weight:800;font-size:13px;}
.fc .fc-daygrid-day-number{padding:7px 8px;font-weight:600;color:#5a6472;font-size:13px;}
.fc .fc-day-sun .fc-daygrid-day-number,.fc .fc-day-sat .fc-daygrid-day-number{color:#d77;}
.fc .fc-daygrid-day-frame{min-height:78px;}

/* события — компактные пилюли с обрезкой */
.fc-daygrid-event{border:none!important;border-radius:7px;margin:1px 4px;padding:2px 7px;font-size:11.5px;font-weight:600;cursor:pointer;box-shadow:none;transition:.15s;overflow:hidden;}
.fc-daygrid-event:hover{filter:brightness(.96);}
.fc-daygrid-event .fc-event-title,
.fc-daygrid-event .fc-event-main{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
.fc .fc-daygrid-event-dot{display:none;}
.fc .fc-daygrid-event-harness{margin-top:2px;}
.fc .fc-more-link{font-weight:700;color:var(--accent);font-size:11px;padding:1px 6px;}
.fc .fc-event-time{display:none;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;}
.overlay.show{display:block;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#d6dce5;border-radius:20px;}

@media(max-width:1100px){
    .sidebar{transform:translateX(-100%);transition:.3s;}
    .sidebar.open{transform:translateX(0);}
    .main-content{margin-left:0;padding:24px;}
    .burger{display:block;}
    .calendar-layout{grid-template-columns:1fr;}
    .day-events{position:relative;}
}
@media(max-width:768px){
    .calendar-top{flex-direction:column;align-items:flex-start;}
    .calendar-wrapper{padding:14px;}
    .fc .fc-toolbar{flex-direction:column;gap:10px;}
    .fc .fc-toolbar-title{font-size:17px;white-space:nowrap;}
    .fc .fc-button-primary{padding:6px 11px;font-size:12px;}
    .fc .fc-daygrid-day-frame{min-height:58px;}
    .fc .fc-daygrid-day-number{padding:6px;font-size:13px;}
    .fc .fc-col-header-cell-cushion{padding:7px 3px;font-size:10px;}
    .fc-daygrid-event{font-size:10px;padding:1px 5px;margin:1px 2px;}
}

/* анти-горизонтальный скролл (мобилки): ничего не вылезает вбок */
html,body{max-width:100%;overflow-x:hidden;}

img,table,video,canvas{max-width:100%;}
@media(max-width:768px){
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;}
}
</style>
</head>

<body>
<div class="dashboard">

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <h2>BuildHouse</h2>
            <p>Личный кабинет</p>
        </div>
        <nav class="menu">
            <a href="client-cabinet.html"><span class="m-ic">🏠</span> Главная</a>
            <a href="orders.html"><span class="m-ic">📦</span> Заказы</a>
            <a href="messages.html"><span class="m-ic">💬</span> Сообщения</a>
            <a class="active"><span class="m-ic">📅</span> Календарь</a>
            <a href="documents.html"><span class="m-ic">📄</span> Документы</a>
            <a href="settings.html"><span class="m-ic">⚙️</span> Настройки</a>
        </nav>
        <button id="logoutBtn">Выйти</button>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main-content">

        <div class="calendar-top">
            <div class="ct-left">
                <button class="burger" id="burger">☰</button>
                <div>
                    <h1>Календарь работ</h1>
                    <p>График этапов вашего ремонта</p>
                </div>
            </div>
        </div>

        <div class="legend">
            <div class="lg"><span class="dot" style="background:#ffb547"></span>Замер</div>
            <div class="lg"><span class="dot" style="background:#2563eb"></span>Смета</div>
            <div class="lg"><span class="dot" style="background:#ef4444"></span>Черновые</div>
            <div class="lg"><span class="dot" style="background:#22c55e"></span>Отделочные</div>
            <div class="lg"><span class="dot" style="background:#8b5cf6"></span>Сдача</div>
        </div>

        <div class="calendar-layout">
            <div class="calendar-wrapper">
                <div id="calendar"></div>
            </div>

            <div class="day-events">
                <h2>План на день</h2>
                <p class="day-sub" id="daySub">Выберите дату в календаре</p>
                <div id="eventsList">
                    <div class="empty-day">Кликните на дату, чтобы увидеть работы</div>
                </div>
            </div>
        </div>

    </main>
</div>


<script type="module">
import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $ = (id)=>document.getElementById(id);

let calendar=null;
let selectedDate=null;
let currentUser=null;

/* БУРГЕР */
const sidebar=$("sidebar"), overlay=$("overlay");
$("burger").addEventListener("click",()=>{sidebar.classList.add("open");overlay.classList.add("show");});
overlay.addEventListener("click",()=>{sidebar.classList.remove("open");overlay.classList.remove("show");});

/* LOGOUT */
$("logoutBtn").addEventListener("click",async()=>{try{await signOut(auth);}catch(e){}window.location.href="../login.html";});

function getColor(type){
    switch(type){
        case "Замер":return "#ffb547";
        case "Смета":return "#2563eb";
        case "Черновые работы":return "#ef4444";
        case "Отделочные работы":return "#22c55e";
        case "Сдача объекта":return "#8b5cf6";
        default:return "#3b82f6";
    }
}

/* AUTH */
onAuthStateChanged(auth,async(user)=>{
    if(!user){window.location.href="../login.html";return;}
    currentUser=user;
    try{
        const snap=await getDoc(doc(db,"users",user.uid));
        if(snap.exists() && snap.data().role==="manager"){window.location.href="../manager/calendar.html";return;}
    }catch(e){}
    initCalendar();
});

/* инициализация календаря — ТОЛЬКО ПРОСМОТР */
function initCalendar(){
    const calendarEl=$("calendar");
    calendar=new FullCalendar.Calendar(calendarEl,{
        locale:"ru",
        initialView:"dayGridMonth",
        titleFormat:(arg)=>{
            const months=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
            return months[arg.date.month]+" "+arg.date.year;
        },
        dayMaxEvents:3,
        fixedWeekCount:false,
        editable:false,
        selectable:false,
        nowIndicator:true,
        height:"auto",
        headerToolbar:{left:"prev,next today",center:"title",right:"dayGridMonth,timeGridWeek,timeGridDay"},
        dateClick(info){
            selectedDate=info.dateStr.slice(0,10);
            renderDayTasks();
            scrollToPlan();
        },
        eventClick(info){
            selectedDate=toLocalDate(info.event.start);
            renderDayTasks();
            scrollToPlan();
        },
        events:[]
    });
    calendar.render();
    loadEvents();
}

/* загрузка событий — ТОЛЬКО СВОИ */
async function loadEvents(){
    try{
        const snap=await getDocs(collection(db,"calendarEvents"));
        let mine=0;
        snap.forEach(docSnap=>{
            const data=docSnap.data();
            if(data.uid!==currentUser.uid)return;
            const start=data.date || data.dateStart || null;
            if(!start)return;
            const color=data.color||getColor(data.workType);
            calendar.addEvent({
                id:docSnap.id,
                title:data.workType||"Работа",
                start:start,
                backgroundColor:color,
                borderColor:color,
                extendedProps:{
                    address:data.address||"",
                    workType:data.workType||"",
                    manager:data.manager||"",
                    comment:data.comment||""
                }
            });
            mine++;
        });
        console.log("Календарь клиента: моих работ =",mine,"| uid =",currentUser.uid);
        if(mine===0){
            $("daySub").textContent="Работы пока не запланированы";
            $("eventsList").innerHTML='<div class="empty-day">Когда менеджер составит график вашего ремонта, работы появятся здесь.</div>';
        }
    }catch(e){console.error("Ошибка календаря:",e);}
}

/* план на день */
function renderDayTasks(){
    const list=$("eventsList");
    if(!selectedDate){
        $("daySub").textContent="Выберите дату в календаре";
        list.innerHTML='<div class="empty-day">Кликните на дату, чтобы увидеть работы</div>';
        return;
    }
    const d=new Date(selectedDate);
    $("daySub").textContent=d.toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"});

    const events=calendar.getEvents().filter(ev=>{
        if(!ev.start)return false;
        return toLocalDate(ev.start)===selectedDate;
    }).sort((a,b)=>a.start-b.start);

    if(!events.length){
        list.innerHTML='<div class="empty-day">На этот день работ не запланировано</div>';
        return;
    }
    list.innerHTML=events.map(ev=>{
        const p=ev.extendedProps;
        const time=ev.start.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
        const color=ev.backgroundColor||"#ffb547";
        return `<div class="event-item" style="border-left-color:${color}">
            <strong>${p.workType||"Работа"}</strong>
            <p>🕒 ${time}</p>
            <p>📍 ${p.address||"—"}</p>
            <p>👷 ${p.manager||"Бригада BuildHouse"}</p>
            ${p.comment?`<p>💬 ${p.comment}</p>`:""}
        </div>`;
    }).join("");
}

function scrollToPlan(){
    if(window.innerWidth<=1100){
        document.querySelector(".day-events")?.scrollIntoView({behavior:"smooth",block:"start"});
    }
}
function toLocalDate(date){
    const y=date.getFullYear();
    const m=String(date.getMonth()+1).padStart(2,"0");
    const day=String(date.getDate()).padStart(2,"0");
    return y+"-"+m+"-"+day;
}
</script>

<script type="module">
// Страховка выхода
import { auth } from "../js/firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
function bindLogout(){
  document.querySelectorAll('#logoutBtn,#logoutBtnSide,[data-logout]').forEach(btn=>{
    if(btn.dataset.lg)return; btn.dataset.lg="1";
    btn.addEventListener("click",async(e)=>{
      e.preventDefault();
      try{ await signOut(auth); }catch(err){}
      window.location.href="../login.html";
    });
  });
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",bindLogout);
else bindLogout();
</script>
</body>
</html>
