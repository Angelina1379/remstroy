<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — BuildHouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== ФОРМЫ ===== */
        .form-block {
            display: none;
            width: 100%;
            max-width: 450px;
            background: #fff;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
            flex-direction: column;
            gap: 18px;
            animation: showForm .3s ease;
        }

        .form-block.active {
            display: flex;
        }

        @keyframes showForm {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-block h2 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
        }

        /* ===== INPUT ===== */
        .form-block input {
            width: 100%;
            border: none;
            background: #f5f5f5;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: .2s;
        }

        .form-block input:focus {
            outline: none;
            background: #efefef;
            box-shadow: 0 0 0 2px #ffb547;
        }

        /* ===== BUTTON ===== */
        .form-block button {
            border: none;
            background: #ffb547;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            font-family: 'Inter', sans-serif;
        }

        .form-block button:hover {
            transform: translateY(-2px);
            background: #ffaa27;
        }

        .form-block button:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        /* ===== LINKS ===== */
        .form-block p {
            text-align: center;
        }

        .form-block a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: .2s;
        }

        .form-block a:hover {
            color: #ff8c42;
        }

        /* ===== ГАЛОЧКА О ПЕРСОНАЛЬНЫХ ДАННЫХ ===== */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 5px 0 5px 0;
            font-size: 14px;
            color: #555;
            text-align: left;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            min-width: 18px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #ffb547;
        }

        .checkbox-group input[type="checkbox"]:focus {
            box-shadow: 0 0 0 2px #ffb547;
        }

        .checkbox-group label {
            cursor: pointer;
            line-height: 1.4;
            font-size: 14px;
        }

        .checkbox-group a {
            color: #ffb547;
            text-decoration: underline;
            font-size: 14px;
        }

        .checkbox-group a:hover {
            color: #ff8c42;
        }

        /* ===== КУКИ БАННЕР ===== */
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2c3e50;
            color: #fff;
            padding: 18px 30px;
            z-index: 9999;
            display: none;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.25);
            font-size: 14px;
            line-height: 1.5;
        }

        .cookie-banner p {
            margin: 0;
            flex: 1;
            min-width: 200px;
            font-size: 14px;
        }

        .cookie-banner a {
            color: #ffb547;
            text-decoration: underline;
            font-weight: 500;
        }

        .cookie-banner a:hover {
            color: #fff;
        }

        .cookie-banner .cookie-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .cookie-banner button {
            padding: 10px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all .3s;
            font-family: 'Inter', sans-serif;
        }

        .cookie-banner .btn-accept {
            background: #ffb547;
            color: #2c3e50;
        }

        .cookie-banner .btn-accept:hover {
            background: #ffaa27;
            transform: translateY(-2px);
        }

        .cookie-banner .btn-decline {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .cookie-banner .btn-decline:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #fff;
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            top: 25px;
            right: 25px;
            min-width: 260px;
            max-width: 350px;
            background: #fff;
            padding: 18px 22px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
            display: none;
            z-index: 9999;
            font-weight: 600;
        }

        .toast-success {
            border-left: 5px solid #2ecc71;
        }

        .toast-error {
            border-left: 5px solid #e74c3c;
        }

        /* ===== МОБИЛКА ===== */
        @media (max-width: 500px) {
            .form-block {
                padding: 30px 24px;
                border-radius: 24px;
            }

            .form-block h2 {
                font-size: 28px;
            }

            .cookie-banner {
                padding: 15px 18px;
                flex-direction: column;
                text-align: center;
            }

            .cookie-banner .cookie-buttons {
                justify-content: center;
                width: 100%;
            }

            .cookie-banner button {
                flex: 1;
                min-width: 120px;
                padding: 10px 16px;
                font-size: 13px;
            }

            .checkbox-group {
                font-size: 13px;
            }

            .checkbox-group label {
                font-size: 13px;
            }

            #toast {
                top: 15px;
                right: 15px;
                left: 15px;
                min-width: auto;
                max-width: none;
                font-size: 14px;
                padding: 14px 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== КУКИ БАННЕР ===== -->
    <div id="cookieBanner" class="cookie-banner" style="display: none;">
        <p>
            🍪 Мы используем cookie-файлы для улучшения работы сайта.
            Продолжая использовать сайт, вы соглашаетесь с
            <a href="cookies.html" target="_blank">политикой использования cookie</a>
            и <a href="privacy.html" target="_blank">политикой конфиденциальности</a>.
        </p>
        <div class="cookie-buttons">
            <button class="btn-accept" id="cookieAccept">Принять</button>
            <button class="btn-decline" id="cookieDecline">Отказаться</button>
        </div>
    </div>

    <!-- ===== ВХОД ===== -->
    <div id="loginForm" class="form-block active">
        <h2>Вход</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button type="button" id="loginBtn">Войти</button>

        <p><a href="#" id="goForgot">Забыли пароль?</a></p>
        <p><a href="#" id="goRegister">Создать аккаунт</a></p>
    </div>

    <!-- ===== РЕГИСТРАЦИЯ ===== -->
    <div id="registerForm" class="form-block">
        <h2>Регистрация</h2>
        <input type="text" id="regName" placeholder="Имя">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="tel" id="regPhone" placeholder="Номер телефона">
        <input type="password" id="regPassword" placeholder="Пароль">

        <!-- ГАЛОЧКА О ПЕРСОНАЛЬНЫХ ДАННЫХ -->
        <div class="checkbox-group">
            <input type="checkbox" id="agreePersonal">
            <label for="agreePersonal">
                Я даю согласие на обработку моих персональных данных в соответствии с
                <a href="privacy.html" target="_blank">Политикой конфиденциальности</a>
            </label>
        </div>

        <button type="button" id="registerBtn">Создать аккаунт</button>

        <p><a href="#" class="goLogin">Назад ко входу</a></p>
    </div>

    <!-- ===== ВОССТАНОВЛЕНИЕ ===== -->
    <div id="forgotForm" class="form-block">
        <h2>Восстановление пароля</h2>
        <input type="email" id="forgotEmail" placeholder="Email">
        <button type="button" id="forgotPasswordBtn">Отправить письмо</button>

        <p><a href="#" class="goLogin">Назад ко входу</a></p>
    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast"></div>

    <!-- ===== JAVASCRIPT ===== -->
  <script type="module">
       ```javascript
import { auth } from "./firebase.js";

import {
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// ============================================================
// ПЕРЕКЛЮЧЕНИЕ ФОРМ
// ============================================================

const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const forgotForm = document.getElementById("forgotForm");

function showForm(form) {

    loginForm.classList.remove("active");
    registerForm.classList.remove("active");
    forgotForm.classList.remove("active");

    form.classList.add("active");

}

document.getElementById("goRegister").onclick = e => {
    e.preventDefault();
    showForm(registerForm);
};

document.getElementById("goForgot").onclick = e => {
    e.preventDefault();
    showForm(forgotForm);
};

document.querySelectorAll(".goLogin").forEach(link => {

    link.onclick = e => {

        e.preventDefault();
        showForm(loginForm);

    };

});


// ============================================================
// TOAST
// ============================================================

const toast = document.getElementById("toast");

function showToast(message, type) {

    toast.textContent = message;
    toast.className = "toast-" + type;
    toast.style.display = "block";

    setTimeout(() => {

        toast.style.display = "none";
        toast.className = "";

    }, 3500);

}


// ============================================================
// РЕГИСТРАЦИЯ
// ============================================================

document.getElementById("registerBtn").addEventListener("click", async () => {

    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value.trim();
    const agree = document.getElementById("agreePersonal").checked;

    if (!agree) {

        showToast("Необходимо согласиться с обработкой персональных данных", "error");
        return;

    }

    if (!email || !password) {

        showToast("Заполните Email и пароль", "error");
        return;

    }

    try {

        await createUserWithEmailAndPassword(auth, email, password);

        showToast("Регистрация успешно завершена!", "success");

        showForm(loginForm);

    }

    catch (e) {

        switch (e.code) {

            case "auth/email-already-in-use":
                showToast("Такой Email уже зарегистрирован", "error");
                break;

            case "auth/weak-password":
                showToast("Пароль должен содержать минимум 6 символов", "error");
                break;

            default:
                showToast("Ошибка регистрации", "error");

        }

    }

});


// ============================================================
// ВХОД
// ============================================================

document.getElementById("loginBtn").addEventListener("click", async () => {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {

        showToast("Введите Email и пароль", "error");
        return;

    }

    try {

        await signInWithEmailAndPassword(auth, email, password);

        showToast("Вход выполнен!", "success");

        setTimeout(() => {

            window.location.href = "index.html";

        }, 1000);

    }

    catch (e) {

        showToast("Неверный Email или пароль", "error");

    }

});


// ============================================================
// ВОССТАНОВЛЕНИЕ ПАРОЛЯ
// ============================================================

document.getElementById("forgotPasswordBtn").addEventListener("click", async () => {

    const email = document.getElementById("forgotEmail").value.trim();

    if (!email) {

        showToast("Введите Email", "error");
        return;

    }

    try {

        await sendPasswordResetEmail(auth, email);

        showToast("Письмо отправлено на Email", "success");

        showForm(loginForm);

    }

    catch (e) {

        showToast("Пользователь не найден", "error");

    }

});


// ============================================================
// COOKIE
// ============================================================

const cookieBanner = document.getElementById("cookieBanner");

if (!document.cookie.includes("cookie_consent")) {

    cookieBanner.style.display = "flex";

}

document.getElementById("cookieAccept").onclick = () => {

    document.cookie = "cookie_consent=accepted; path=/; max-age=31536000";

    cookieBanner.style.display = "none";

};

document.getElementById("cookieDecline").onclick = () => {

    document.cookie = "cookie_consent=declined; path=/; max-age=31536000";

    cookieBanner.style.display = "none";

};


// ============================================================
// ПРОВЕРКА АВТОРИЗАЦИИ
// ============================================================

onAuthStateChanged(auth, user => {

    if (user) {

        window.location.href = "index.html";

    }

});


// ============================================================
// ENTER
// ============================================================

document.addEventListener("keydown", e => {

    if (e.key !== "Enter") return;

    if (loginForm.classList.contains("active")) {

        document.getElementById("loginBtn").click();

    }

    if (registerForm.classList.contains("active")) {

        document.getElementById("registerBtn").click();

    }

    if (forgotForm.classList.contains("active")) {

        document.getElementById("forgotPasswordBtn").click();

    }

});
```

    </script>
</body>
</html>
