<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Вход</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- ВХОД -->
  <div id="loginForm" class="form-block">
    <h2>Вход</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button type="button" id="loginBtn">Войти</button>

    <p><a href="#" id="goForgot">Забыли пароль?</a></p>
    <p><a href="#" id="goRegister">Создать аккаунт</a></p>
  </div>

  <!-- РЕГИСТРАЦИЯ -->
  <div id="registerForm" class="form-block" style="display:none;">
    <h2>Регистрация</h2>
    <input type="text" id="regName" placeholder="Имя">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="tel" id="regPhone" placeholder="Номер телефона">
    <input type="password" id="regPassword" placeholder="Пароль">
    <button type="button" id="registerBtn">Создать аккаунт</button>

    <p><a href="#" class="goLogin">Назад ко входу</a></p>
  </div>

  <!-- ВОССТАНОВЛЕНИЕ -->
  <div id="forgotForm" class="form-block" style="display:none;">
    <h2>Восстановление пароля</h2>
    <input type="email" id="forgotEmail" placeholder="Email">
    <button type="button" id="forgotPasswordBtn">Отправить письмо</button>

    <p><a href="#" class="goLogin">Назад ко входу</a></p>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script type="module" src="login.js"></script>
</body>
</html>
