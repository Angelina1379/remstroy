<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Вход</title>

<link rel="stylesheet" href="css/login.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
<!-- КУКИ БАННЕР -->
<div id="cookieBanner" class="cookie-banner" style="display: none;">
    <p>
        🍪 Мы используем cookie-файлы для улучшения работы сайта. 
        Продолжая использовать сайт, вы соглашаетесь с 
        <a href="cookies.html" target="_blank">политикой использования cookie</a> 
        и <a href="privacy.html" target="_blank">политикой конфиденциальности</a>.
    </p>
    <div class="cookie-buttons">
        <button class="btn-accept" id="cookieAccept">Принять</button>
        <button class="btn-decline" id="cookieDecline">Отказаться</button>
    </div>
</div>
  <!-- ВХОД -->
<div id="loginForm" class="form-block active">
    <h2>Вход</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button type="button" id="loginBtn">Войти</button>

    <p><a href="#" id="goForgot">Забыли пароль?</a></p>
    <p><a href="#" id="goRegister">Создать аккаунт</a></p>
  </div>

  <!-- РЕГИСТРАЦИЯ -->
  <div id="registerForm" class="form-block">
    <h2>Регистрация</h2>
    <input type="text" id="regName" placeholder="Имя">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="tel" id="regPhone" placeholder="Номер телефона">
    <input type="password" id="regPassword" placeholder="Пароль">
    <div class="checkbox-group">
        <input type="checkbox" id="agreePersonal">
        <label for="agreePersonal">
            Я даю согласие на обработку моих персональных данных в соответствии с 
            <a href="privacy.html" target="_blank">Политикой конфиденциальности</a>
        </label>
    </div>
    <button type="button" id="registerBtn">Создать аккаунт</button>

    <p><a href="#" class="goLogin">Назад ко входу</a></p>
  </div>

  <!-- ВОССТАНОВЛЕНИЕ -->
  <div id="forgotForm" class="form-block">
    <h2>Восстановление пароля</h2>
    <input type="email" id="forgotEmail" placeholder="Email">
    <button type="button" id="forgotPasswordBtn">Отправить письмо</button>

    <p><a href="#" class="goLogin">Назад ко входу</a></p>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
