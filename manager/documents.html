<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Документы | BuildHouse</title>

  <link rel="stylesheet" href="css/documents.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- DOCX -->
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

  <!-- FILE SAVER -->
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <!-- PDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">
      <h2>BuildHouse</h2>
      <p>Панель менеджера</p>
    </div>

    <nav class="menu">
      <a href="manager.html">Главная</a>
      <a href="messages.html">Сообщения</a>
      <a class="active">Документы</a>
      <a href="analytics.html">Аналитика</a>

      <button id="logoutBtn">Выйти</button>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <div class="top-bar">

      <div>
        <h1>Документы</h1>
        <p>Автоматическое создание договоров, смет и актов</p>
      </div>

      <div class="manager-card">
        <div class="avatar"></div>
        <div>
          <h4 id="managerName">Менеджер</h4>
          <p>BuildHouse CRM</p>
        </div>
      </div>

    </div>

    <!-- CLIENTS -->
    <div class="clients-section">

      <div class="section-top">
        <h2>Клиенты</h2>

        <input
          type="text"
          id="searchInput"
          placeholder="Поиск клиента..."
        >
      </div>

      <div id="clientsList" class="clients-list"></div>

    </div>

    <!-- FORM -->
    <div class="document-form">

      <h2>Данные документа</h2>

      <div class="form-grid">

        <input type="text" id="clientName" placeholder="Имя клиента">

        <input type="text" id="clientPhone" placeholder="Телефон">

        <input type="text" id="projectAddress" placeholder="Адрес объекта">

        <input type="text" id="managerInput" placeholder="Менеджер">

        <input type="text" id="deadlineInput" placeholder="Срок сдачи">

      </div>

      <!-- ESTIMATE -->
      <div class="estimate-section">

        <div class="estimate-top">
          <h2>Смета</h2>

          <button id="addItemBtn">
            + Добавить работу
          </button>
        </div>

        <div id="estimateItems"></div>

        <div class="total-block">
          Итого:
          <span id="totalPrice">0 ₽</span>
        </div>

      </div>

      <!-- BUTTONS -->
      <div class="actions">

        <button id="saveEstimateBtn">
          Сохранить
        </button>

        <button id="excelBtn">
          Скачать Excel
        </button>

        <button id="docxBtn">
          Скачать Word
        </button>

        <button id="pdfBtn">
          Скачать PDF
        </button>

      </div>

    </div>

  </main>

</div>

<script type="module" src="js/documents.js"></script>

</body>
</html>
