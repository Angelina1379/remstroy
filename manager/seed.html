<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Заполнение отзывов | BuildHouse</title>
<style>
body{font-family:Inter,Arial,sans-serif;background:#f5f6fa;color:#1b2430;max-width:800px;margin:40px auto;padding:20px;}
h1{font-size:26px;}
button{border:none;background:#ffb547;color:#111;padding:16px 28px;border-radius:14px;font-weight:700;font-size:16px;cursor:pointer;margin:10px 0;}
button:hover{background:#f39a1f;}button:disabled{background:#ffd699;cursor:not-allowed;}
.log{background:#0b1220;color:#aee;border-radius:14px;padding:18px;margin-top:20px;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:520px;overflow-y:auto;}
.warn{background:#fff3df;border-radius:12px;padding:16px;color:#a86500;margin:16px 0;}
.ok{color:#7CFC00;}.err{color:#ff8080;}
</style>
</head>
<body>
<h1>⭐ Заполнение отзывов</h1>
<div class="warn">
<b>Что делает:</b> находит все заказы со статусом «Завершён» (объект сдан) и создаёт от каждого клиента положительный отзыв, связанный с его видом работ.<br><br>
<b>Запустить один раз.</b> Откройте через Live Server. После — файл можно удалить.
</div>
<button id="runBtn">Создать отзывы по завершённым заказам</button>
<div class="log" id="log">Готов к запуску...</div>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const log=(m,c="")=>{const el=document.getElementById("log");el.innerHTML+=`\n<span class="${c}">${m}</span>`;el.scrollTop=el.scrollHeight;};
const pick=(a)=>a[Math.floor(Math.random()*a.length)];

/* тексты отзывов по типам работ — несколько вариантов на каждый */
const REVIEWS={
  "дизайн":[
    "Заказывали дизайнерский ремонт под ключ и не пожалели ни на секунду. Дизайнер вник в наши пожелания, предложил планировку, о которой мы сами бы не догадались. Подбор материалов, цветов, света — всё продумано до мелочей. Квартира получилась как с обложки журнала, гости не верят, что это та же самая «однушка». Спасибо команде BuildHouse за вкус и терпение!",
    "Хотели не просто ремонт, а именно дизайнерское решение — и получили его. Очень понравилось, что показывали 3D-визуализацию ещё до начала работ, мы заранее видели результат. Реальность совпала с картинкой на 100%. Отдельно отмечу подбор мебели и освещения — атмосфера в квартире теперь невероятная. Рекомендую всем, кто хочет красиво и со вкусом.",
    "Дизайнерский ремонт превзошёл ожидания. Ребята соединили стиль и удобство: каждая зона функциональна и при этом эстетична. Нестандартные решения с нишами и подсветкой сделали интерьер дорогим на вид. Работали аккуратно, убирали за собой. Это лучшее вложение в наш дом."
  ],
  "капитальный":[
    "Делали капитальный ремонт квартиры полностью — меняли всё, от проводки и труб до стен и полов. Работа огромная, но команда справилась на отлично. Выровняли стены идеально, развели электрику грамотно, ничего не пришлось переделывать. Сроки соблюли, бюджет не вырос внезапно. Квартира фактически новая. Огромное спасибо!",
    "Капитальный ремонт — это серьёзное испытание, но с BuildHouse оно прошло спокойно. Старую квартиру преобразили полностью: новая стяжка, ровные стены, переложенная сантехника и электрика. Качество чувствуется в каждой детали. Менеджер держал в курсе на каждом этапе. Теперь рекомендуем их всем родственникам.",
    "Брали капитальный ремонт «убитой» квартиры от бабушки. Боялись, что будет долго и нервно — но нет. Демонтаж, черновые работы, чистовая отделка — всё по графику и качественно. Особенно порадовало, что все коммуникации сделали по уму, на совесть. Спасибо за честную и крепкую работу!"
  ],
  "ванная":[
    "Ремонт ванной комнаты сделали выше всяких похвал. Плитку уложили идеально — швы ровные, углы аккуратные, ни одного зазора. Сантехника подобрана и установлена грамотно, всё работает без нареканий. Маленькую ванную умудрились сделать просторной и стильной. Очень довольны результатом!",
    "Заказывали ремонт ванной — получилась картинка. Мастера по плитке настоящие профессионалы: рисунок подобран, раскладка продумана, нигде ничего не «гуляет». Поменяли трубы, поставили новую сантехнику, сделали тёплый пол. Теперь утро начинается с удовольствия. Спасибо BuildHouse!",
    "Ванная преобразилась полностью. Очень аккуратная укладка плитки и качественная гидроизоляция — для санузла это главное. Сантехнику установили чисто, всё герметично, нигде не подтекает. Работали быстро и без грязи по всей квартире. Рекомендую за надёжность."
  ],
  "кухня":[
    "Ремонт кухни сделали именно так, как мечтали. Грамотно развели розетки под технику, вывели вытяжку, выровняли стены под фартук. Плитку-кабанчик уложили безупречно. Теперь готовить — одно удовольствие, всё под рукой и красиво. Спасибо команде за внимание к деталям!",
    "Кухня получилась функциональной и уютной. Ребята продумали все мелочи: подсветку рабочей зоны, расположение розеток, ровные стены под кухонный гарнитур. Сделали качественно и в срок. Очень довольны, рекомендуем BuildHouse всем друзьям.",
    "Делали ремонт на кухне — остались в полном восторге. Особенно порадовала аккуратная работа с плиткой и идеально выведенные углы. Вся электрика под технику разведена правильно. Чисто, быстро, профессионально."
  ],
  "студия":[
    "Ремонт студии превратил маленькое пространство в стильное и продуманное жильё. Грамотное зонирование, много света, аккуратная отделка. Команда предложила решения, которые визуально увеличили площадь. Живём и радуемся каждый день. Спасибо!",
    "Студию отремонтировали на отлично. Несмотря на небольшую площадь, сделали всё с умом — каждый метр работает. Отделка качественная, материалы хорошие. Результат стильный и современный. Рекомендую BuildHouse за продуманный подход."
  ],
  "новостройка":[
    "Отделка новостройки от голых стен до готового жилья прошла идеально. Заехали в квартиру, где всё было сделано на совесть: ровные стены, аккуратные полы, грамотная электрика. Не пришлось ничего доделывать. Команда работала чётко по графику. Огромное спасибо за новый дом!",
    "Брали отделку новостройки под ключ. Получили полностью готовую квартиру — заезжай и живи. Качество черновых и чистовых работ на высоте, всё ровно и аккуратно. Менеджер сопровождал на каждом этапе. Очень довольны, рекомендуем!"
  ],
  "косметический":[
    "Косметический ремонт освежил квартиру до неузнаваемости. Поклеили обои идеально ровно, покрасили потолки, обновили полы. Быстро, чисто и недорого. Квартира будто помолодела на десять лет. Спасибо команде BuildHouse за аккуратность!",
    "Делали косметический ремонт — остались очень довольны. Стены выровняли, обои поклеили без единого пузыря, потолки покрасили ровно. Работали быстро и убирали за собой. Отличное соотношение цены и качества. Рекомендую!",
    "Лёгкий освежающий ремонт сделали за две недели. Всё аккуратно: ровные стены, чистая покраска, новые покрытия. Команда вежливая, пунктуальная. Квартира стала светлой и уютной. Спасибо большое!"
  ]
};

function reviewFor(service){
  const s=(service||"").toLowerCase();
  if(s.includes("дизайн"))return pick(REVIEWS["дизайн"]);
  if(s.includes("капитальн"))return pick(REVIEWS["капитальный"]);
  if(s.includes("ванн"))return pick(REVIEWS["ванная"]);
  if(s.includes("кухн"))return pick(REVIEWS["кухня"]);
  if(s.includes("студи"))return pick(REVIEWS["студия"]);
  if(s.includes("новостро"))return pick(REVIEWS["новостройка"]);
  return pick(REVIEWS["косметический"]);
}

document.getElementById("runBtn").addEventListener("click",async()=>{
  const btn=document.getElementById("runBtn");btn.disabled=true;
  document.getElementById("log").innerHTML="Загружаю завершённые заказы...";
  try{
    const snap=await getDocs(collection(db,"projects"));
    let done=[];
    snap.forEach(d=>{const p=d.data();const st=p.status;if(st==="Завершён"||st==="Завершен")done.push({id:d.id,...p});});
    if(!done.length){log("❌ Нет заказов со статусом «Завершён». Сначала создайте заказы.","err");btn.disabled=false;return;}
    log(`✅ Найдено завершённых заказов: ${done.length}`,"ok");
    log("Создаю отзывы...");

    let n=0;
    for(const p of done){
      const text=reviewFor(p.service||p.title);
      const rating=Math.random()<0.7?5:4; // в основном 5, иногда 4 — для реалистичности
      // дата отзыва — немного позже создания заказа
      const base=p.createdAt||Date.now();
      const reviewDate=base+Math.floor(Math.random()*40+20)*86400000;
      await addDoc(collection(db,"reviews"),{
        uid:p.uid,
        name:p.clientName||"Клиент",
        text,
        rating,
        service:p.service||p.title||"",
        orderId:p.id,
        createdAt:reviewDate
      });
      n++;
      log(`${n}. ${p.clientName} — ${p.service||p.title} — ${rating}★`,"ok");
    }
    log(`\n🎉 Готово! Создано отзывов: ${n}`,"ok");
    log("Отзывы появятся на сайте, на странице отзывов и в аналитике менеджера. Файл можно удалить.","ok");
  }catch(e){log("❌ Ошибка: "+e.message,"err");}
  btn.disabled=false;
});
</script>
</body>
</html>
