<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Заполнение заказов | BuildHouse</title>
<style>
body{font-family:Inter,Arial,sans-serif;background:#f5f6fa;color:#1b2430;max-width:800px;margin:40px auto;padding:20px;}
h1{font-size:26px;}
button{border:none;background:#ffb547;color:#111;padding:16px 28px;border-radius:14px;font-weight:700;font-size:16px;cursor:pointer;margin:10px 0;}
button:hover{background:#f39a1f;}
button:disabled{background:#ffd699;cursor:not-allowed;}
.log{background:#0b1220;color:#aee;border-radius:14px;padding:18px;margin-top:20px;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:500px;overflow-y:auto;}
.warn{background:#fff3df;border-radius:12px;padding:16px;color:#a86500;margin:16px 0;}
.ok{color:#7CFC00;}.err{color:#ff8080;}
</style>
</head>
<body>
<h1>🏗️ Заполнение заказов и календаря</h1>
<div class="warn">
<b>Что делает:</b> берёт ваших реальных клиентов из базы и создаёт под них 20 заказов и записи в календаре с датами за 2026 год (январь–июнь).<br><br>
<b>Запустить один раз.</b> Откройте через Live Server. После заполнения этот файл можно удалить.
</div>
<button id="runBtn">Создать 20 заказов + календарь</button>
<div class="log" id="log">Готов к запуску...</div>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const log=(msg,cls="")=>{const el=document.getElementById("log");el.innerHTML+=`\n<span class="${cls}">${msg}</span>`;el.scrollTop=el.scrollHeight;};

const SERVICES=[
  {name:"Косметический ремонт квартиры",min:120000,max:280000},
  {name:"Капитальный ремонт квартиры",min:350000,max:850000},
  {name:"Ремонт ванной комнаты",min:90000,max:220000},
  {name:"Ремонт кухни",min:110000,max:260000},
  {name:"Дизайнерский ремонт под ключ",min:600000,max:1500000},
  {name:"Ремонт студии",min:150000,max:380000},
  {name:"Отделка новостройки",min:280000,max:650000},
];
const STREETS=["ул. Савушкина","ул. Татищева","ул. Боевая","ул. Адмирала Нахимова","ул. Победы","ул. Кирова","ул. Свердлова","ул. Анри Барбюса","ул. Бакинская","пл. Ленина"];
const STATUSES=["Завершён","Завершён","Завершён","В работе","В работе","Новая заявка"];
const WORKTYPES=["Замер","Черновые работы","Отделочные работы","Сдача объекта"];
const WT_COLOR={"Замер":"#ffb547","Смета":"#2563eb","Черновые работы":"#ef4444","Отделочные работы":"#22c55e","Сдача объекта":"#8b5cf6"};

const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=(arr)=>arr[rnd(0,arr.length-1)];
// случайная дата 2026, январь(0)–май(4), чтобы было "до июня"
function dateBeforeJune(){
  const month=rnd(0,4); const day=rnd(1,28);
  return new Date(2026,month,day,rnd(9,17),pick([0,30]));
}

document.getElementById("runBtn").addEventListener("click",async()=>{
  const btn=document.getElementById("runBtn");
  btn.disabled=true;
  document.getElementById("log").innerHTML="Загружаю клиентов...";
  try{
    const snap=await getDocs(collection(db,"users"));
    let clients=[];
    snap.forEach(d=>{const u=d.data();if(u.role!=="manager"&&u.uid)clients.push(u);});
    if(!clients.length){log("❌ Клиенты не найдены. Сначала создайте клиентов.","err");btn.disabled=false;return;}
    log(`✅ Найдено клиентов: ${clients.length}`,"ok");
    log("Создаю 20 заказов...");

    for(let i=0;i<20;i++){
      const c=pick(clients);
      const svc=pick(SERVICES);
      const status=pick(STATUSES);
      const budget=rnd(svc.min,svc.max);
      const created=dateBeforeJune();
      const address=`г. Астрахань, ${pick(STREETS)}, д. ${rnd(1,80)}, кв. ${rnd(1,200)}`;
      const progress=status==="Завершён"?100:(status==="В работе"?rnd(30,80):5);

      // ЗАКАЗ
      const proj={
        uid:c.uid,
        clientName:c.name,
        phone:c.phone||"",
        email:c.email||"",
        service:svc.name,
        title:svc.name,
        address,
        status,
        budget,
        manager:"Менеджер BuildHouse",
        progress,
        createdAt:created.getTime(),
        deadline:new Date(created.getTime()+rnd(30,75)*86400000).toLocaleDateString("ru-RU"),
        history:[{title:"Заявка создана",date:created.toLocaleString("ru-RU")}]
      };
      const ref=await addDoc(collection(db,"projects"),proj);

      // КАЛЕНДАРЬ: для завершённых и в работе — добавим 1-2 записи
      if(status!=="Новая заявка"){
        const evCount=rnd(1,2);
        for(let k=0;k<evCount;k++){
          const wt=pick(WORKTYPES);
          const evDate=new Date(created.getTime()+rnd(2,40)*86400000);
          if(evDate.getMonth()>4 && evDate.getFullYear()===2026)evDate.setMonth(4); // не позже мая
          const iso=evDate.toISOString();
          await addDoc(collection(db,"calendarEvents"),{
            uid:c.uid,
            client:c.name,
            clientName:c.name,
            phone:c.phone||"",
            address,
            workType:wt,
            comment:"По заказу: "+svc.name,
            orderId:ref.id,
            date:iso,
            dateStart:iso.slice(0,10),
            dateEnd:iso.slice(0,10),
            color:WT_COLOR[wt],
            manager:"Менеджер BuildHouse",
            createdAt:created.getTime()
          });
        }
      }
      log(`${i+1}. ${c.name} — ${svc.name} — ${budget.toLocaleString("ru-RU")}₽ — ${status} (${created.toLocaleDateString("ru-RU")})`,"ok");
    }
    log("\n🎉 Готово! 20 заказов и записи в календаре созданы.","ok");
    log("Теперь можно удалить этот файл. Откройте панель менеджера — данные на месте.","ok");
  }catch(e){
    log("❌ Ошибка: "+e.message,"err");
  }
  btn.disabled=false;
});
</script>
</body>
</html>
