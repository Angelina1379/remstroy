<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Календарь замеров | BuildHouse CRM
    </title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <h2>
                BuildHouse
            </h2>

            <p>
                Панель менеджера
            </p>

        </div>

        <nav class="menu">

<a href="manager-panel.html">
Главная
</a>

<a href="projects.html">
Заказы
</a>

<a href="klients.html">
Клиенты
</a>

<a href="messages.html">
Сообщения
</a>

<a class="active">
Замеры
</a>

<a href="documents.html">
Документы
</a>

<a href="setting.html">
Настройки
</a>

<button id="logoutBtn">
Выйти
</button>

</nav>


    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <div class="calendar-top">

            <div>

                <h1>
                    Календарь замеров и работ
                </h1>

                <p>
                    Планирование выездов, замеров и этапов ремонта
                </p>

            </div>

            <button id="openModalBtn">

                + Добавить запись

            </button>

        </div>

        <div class="calendar-layout">

            <!-- КАЛЕНДАРЬ -->

            <div class="calendar-wrapper">

                <div id="calendar"></div>

            </div>

            <!-- ПЛАН НА ДЕНЬ -->

            <div class="day-events">

                <h2>
                    План на день
                </h2>

                <div id="eventsList">

                    <p>
                        Выберите дату в календаре
                    </p>

                </div>

            </div>

        </div>

    </main>

</div>

<!-- MODAL -->

<div id="taskModal"
     class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>

                Новая запись

            </h2>

            <button id="closeModal">

                ✕

            </button>

        </div>

        <div class="modal-grid">

            <input
                id="clientName"
                type="text"
                placeholder="ФИО клиента *">

            <input
                id="clientPhone"
                type="tel"
                placeholder="Телефон">

            <input
                id="clientAddress"
                type="text"
                placeholder="Адрес объекта *">

            <select id="workType">

                <option value="">
                    Тип работ
                </option>

                <option value="Замер">
                    Замер
                </option>

                <option value="Смета">
                    Смета
                </option>

                <option value="Черновые работы">
                    Черновые работы
                </option>

                <option value="Отделочные работы">
                    Отделочные работы
                </option>

                <option value="Сдача объекта">
                    Сдача объекта
                </option>

            </select>

            <input
                id="eventDate"
                type="datetime-local">

            <input
                id="manager"
                type="text"
                placeholder="Ответственный сотрудник">

            <textarea
                id="comment"
                rows="4"
                placeholder="Комментарий"></textarea>

        </div>

        <div class="modal-actions">

            <button id="saveTaskBtn">

                Сохранить запись

            </button>

            <button
                class="delete-btn"
                onclick="deleteCurrentEvent()">

                Удалить запись

            </button>

        </div>

    </div>

</div>

<script type="module" src="js/calendar.js"></script>

</body>

</html>
