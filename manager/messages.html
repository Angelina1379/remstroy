<!DOCTYPE html>

<html lang="ru">
<head>

  <meta charset="UTF-8">

<meta name="viewport"
     content="width=device-width, initial-scale=1.0">

  <title>Сообщения менеджера</title>

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#f5f6fa;
  color:#111;
}

/* =========================================
   LAYOUT
========================================= */

.dashboard{
  display:flex;
  min-height:100vh;
}

/* =========================================
   SIDEBAR MENU
========================================= */

.sidebar{
  width:260px;
  background:#0b1220;
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.logo h2{
  color:#ffb547;
  font-size:28px;
}

.logo p{
  color:#999;
  margin-top:6px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:40px;
}

.menu a{
  text-decoration:none;
  color:#ffb547;
  padding:14px 18px;
  border-radius:14px;
  transition:0.3s;
  font-weight:500;
}

.menu a:hover{
  background:#1d2638;
  color:white;
}

.menu .active{
  background:#ffb547;
  color:#111;
  font-weight:600;
}

#logoutBtn{
  margin-top:20px;
  border:none;
  background:#ffb547;
  color:#111;
  padding:16px;
  border-radius:16px;
  cursor:pointer;
  font-weight:600;
  font-family:'Inter',sans-serif;
}

.profile{
  display:flex;
  align-items:center;
  gap:14px;
  margin-top:40px;
}

.avatar-small{
  width:52px;
  height:52px;
  border-radius:50%;
  background:#ddd;
}

.profile h4{
  color:white;
}

.profile p{
  color:#999;
  font-size:14px;
}

/* =========================================
   MESSENGER
========================================= */

.messenger{
  flex:1;
  display:flex;
  height:100vh;
}

/* =========================================
   CHAT SIDEBAR
========================================= */

.chat-sidebar{
  width:340px;
  background:white;
  border-right:1px solid #eee;
  display:flex;
  flex-direction:column;
}

.sidebar-top{
  padding:24px;
  border-bottom:1px solid #eee;
}

.sidebar-top h2{
  margin-bottom:16px;
}

.sidebar-top input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#f5f5f5;
  font-family:'Inter',sans-serif;
}

.clients-list{
  overflow-y:auto;
  flex:1;
}

.client-item{
  padding:18px 20px;
  border-bottom:1px solid #f1f1f1;
  cursor:pointer;
  transition:0.2s;
}

.client-item:hover{
  background:#fafafa;
}

.client-item.active{
  background:#fff4df;
}

.client-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.client-name{
  font-weight:600;
}

.client-last{
  color:#777;
  font-size:14px;
}

.client-time{
  font-size:12px;
  color:#999;
}

/* =========================================
   CHAT MAIN
========================================= */

.chat-main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  height:90px;
  background:white;
  padding:20px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

.chat-user{
  display:flex;
  align-items:center;
  gap:14px;
}

.avatar,
.big-avatar{
  border-radius:50%;
  background:#ddd;
}

.avatar{
  width:54px;
  height:54px;
}

.big-avatar{
  width:100px;
  height:100px;
}

.messages-container{
  flex:1;
  overflow-y:auto;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* =========================================
   MESSAGES
========================================= */

.message{
  max-width:70%;
  padding:14px 18px;
  border-radius:18px;
  line-height:1.5;
  word-break:break-word;
}

.manager{
  background:#ffb547;
  align-self:flex-end;
}

.client{
  background:white;
  align-self:flex-start;
}

.message-time{
  font-size:12px;
  opacity:0.6;
  margin-top:8px;
}

.file-box{
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,0.5);
  border-radius:12px;
}

/* =========================================
   INPUT
========================================= */

.chat-input{
  background:white;
  padding:20px;
  display:flex;
  align-items:center;
  gap:12px;
  border-top:1px solid #eee;
}

.chat-input input{
  flex:1;
  padding:16px;
  border:none;
  border-radius:16px;
  background:#f5f5f5;
  font-family:'Inter',sans-serif;
}

.chat-input button,
.attach-btn{
  width:52px;
  height:52px;
  border:none;
  border-radius:16px;
  background:#ffb547;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:20px;
}

.file-preview{
  padding:10px 20px;
  background:#fff;
}

/* =========================================
   MODAL
========================================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  width:420px;
  background:white;
  border-radius:24px;
  padding:30px;
}

.modal-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:24px;
}

.profile-info{
  text-align:center;
}

.profile-info h3{
  margin-top:20px;
  margin-bottom:10px;
}

.modal button{
  border:none;
  background:#f5f5f5;
  width:42px;
  height:42px;
  border-radius:12px;
  cursor:pointer;
}

/* =========================================
   EMPTY
========================================= */

.empty-chat{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#888;
  font-size:18px;
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:1000px){

  .sidebar{
    display:none;
  }

  .chat-sidebar{
    width:100%;
    max-width:320px;
  }

}

</style>

</head>

<body>

<div class="dashboard">

  <!-- LEFT MENU -->

  <aside class="sidebar">

```
<div>

  <div class="logo">
    <h2>BuildHouse</h2>
    <p>Панель менеджера</p>
  </div>

  <nav class="menu">

    <a href="manager-panel.html">
      Рабочий стол
    </a>

    <a href="projects.html">
      Проекты
    </a>

    <a href="clients.html">
      Клиенты
    </a>

    <a class="active">
      Сообщения
    </a>

    <a href="documents.html">
      Документы
    </a>

  </nav>

</div>

<div>

  <button id="logoutBtn">
    Выйти
  </button>

  <div class="profile">

    <div class="avatar-small"></div>

    <div>

      <h4 id="managerName">
        Менеджер
      </h4>

      <p>
        Сотрудник компании
      </p>

    </div>

  </div>

</div>
```

  </aside>

  <!-- MESSENGER -->

  <div class="messenger">

```
<!-- CHAT LIST -->
<aside class="chat-sidebar">

  <div class="sidebar-top">

    <h2>
      Сообщения
    </h2>

    <input
      type="text"
      id="searchInput"
      placeholder="Поиск клиента..."
    >

  </div>

  <div
    id="clientsList"
    class="clients-list"
  ></div>

</aside>

<!-- CHAT -->
<main class="chat-main">

  <div class="chat-header">

    <div class="chat-user">

      <div class="avatar"></div>

      <div>

        <h3 id="chatUsername">
          Выберите чат
        </h3>

        <p id="chatStatus">
          Ожидание...
        </p>

      </div>

    </div>

    <button id="profileBtn">
      Профиль
    </button>

  </div>

  <div
    id="messagesContainer"
    class="messages-container"
  >

    <div class="empty-chat">
      Выберите клиента слева
    </div>

  </div>

  <div
    id="filePreview"
    class="file-preview"
  ></div>

  <div class="chat-input">

    <label class="attach-btn">

      📎

      <input
        type="file"
        id="fileInput"
        hidden
      >

    </label>

    <input
      type="text"
      id="messageInput"
      placeholder="Введите сообщение..."
    >

    <button id="voiceBtn">
      🎤
    </button>

    <button id="sendBtn">
      ➤
    </button>

  </div>

</main>
```

  </div>

</div>

<!-- MODAL -->

<div
  id="profileModal"
  class="modal"
>

  <div class="modal-content">

```
<div class="modal-top">

  <h2>
    Профиль клиента
  </h2>

  <button id="closeModal">
    ✕
  </button>

</div>

<div class="profile-info">

  <div class="big-avatar"></div>

  <h3 id="modalName"></h3>

  <p id="modalPhone"></p>

  <p id="modalEmail"></p>

</div>
```

  </div>

</div>

<script type="module">

import { auth, db, storage }
from "./firebase.js";

import {
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  collection,
  query,
  orderBy,
  onSnapshot,
  addDoc,
  serverTimestamp,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// ======================================
// ELEMENTS
// ======================================

const clientsList =
document.getElementById("clientsList");

const messagesContainer =
document.getElementById("messagesContainer");

const sendBtn =
document.getElementById("sendBtn");

const messageInput =
document.getElementById("messageInput");

const fileInput =
document.getElementById("fileInput");

const profileBtn =
document.getElementById("profileBtn");

const modal =
document.getElementById("profileModal");

const closeModal =
document.getElementById("closeModal");

const searchInput =
document.getElementById("searchInput");

const logoutBtn =
document.getElementById("logoutBtn");

// ======================================
// STATE
// ======================================

let currentClient = null;
let selectedFile = null;
let allClients = [];

// ======================================
// LOGOUT
// ======================================

logoutBtn.addEventListener("click", async () => {

  await signOut(auth);

  window.location.href = "login.html";

});

// ======================================
// FILE SELECT
// ======================================

fileInput.addEventListener("change", () => {

  selectedFile = fileInput.files[0];

  const preview =
  document.getElementById("filePreview");

  if(selectedFile){

    preview.innerHTML = `
      <p>
        📎 ${selectedFile.name}
      </p>
    `;

  }

});

// ======================================
// CLIENTS
// ======================================

const usersRef =
collection(db, "users");

onSnapshot(usersRef, (snapshot) => {

  allClients = [];

  snapshot.forEach(docSnap => {

    const user = {
      id: docSnap.id,
      ...docSnap.data()
    };

    allClients.push(user);

  });

  renderClients(allClients);

});

// ======================================
// SEARCH
// ======================================

searchInput.addEventListener("input", () => {

  const value =
  searchInput.value.toLowerCase();

  const filtered =
  allClients.filter(client =>
    (client.name || "")
    .toLowerCase()
    .includes(value)
  );

  renderClients(filtered);

});

// ======================================
// RENDER CLIENTS
// ======================================

function renderClients(clients){

  clientsList.innerHTML = "";

  clients.forEach(client => {

    const div =
    document.createElement("div");

    div.className = "client-item";

    div.innerHTML = `
      <div class="client-top">

        <div class="client-name">
          ${client.name || "Клиент"}
        </div>

        <div class="client-time">
          чат
        </div>

      </div>

      <div class="client-last">
        ${client.email || ""}
      </div>
    `;

    div.addEventListener("click", () => {

      currentClient = client;

      document.getElementById("chatUsername")
      .textContent =
      client.name || "Клиент";

      document.getElementById("chatStatus")
      .textContent =
      client.email || "";

      loadMessages(client.id);

    });

    clientsList.appendChild(div);

  });

}

// ======================================
// LOAD MESSAGES
// ======================================

function loadMessages(clientId){

  messagesContainer.innerHTML = "";

  const messagesRef = query(
    collection(db, "chats", clientId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(messagesRef, (snapshot) => {

    messagesContainer.innerHTML = "";

    snapshot.forEach(docSnap => {

      const msg =
      docSnap.data();

      const div =
      document.createElement("div");

      div.className =
      msg.sender === "manager"
      ? "message manager"
      : "message client";

      let fileHTML = "";

      if(msg.fileUrl){

        fileHTML = `
          <div class="file-box">
            <a href="${msg.fileUrl}"
               target="_blank">

              📎 ${msg.fileName}

            </a>
          </div>
        `;

      }

      const time =
      msg.createdAt?.toDate
      ? msg.createdAt.toDate()
      : new Date();

      div.innerHTML = `
        <div>
          ${msg.text || ""}
        </div>

        ${fileHTML}

        <div class="message-time">
          ${time.toLocaleString()}
        </div>
      `;

      messagesContainer.appendChild(div);

    });

    messagesContainer.scrollTop =
    messagesContainer.scrollHeight;

  });

}

// ======================================
// SEND MESSAGE
// ======================================

sendBtn.addEventListener("click", async () => {

  if(!currentClient) return;

  const text =
  messageInput.value.trim();

  let fileUrl = "";
  let fileName = "";

  // FILE
  if(selectedFile){

    const storageRef =
    ref(
      storage,
      `chatFiles/${Date.now()}_${selectedFile.name}`
    );

    await uploadBytes(
      storageRef,
      selectedFile
    );

    fileUrl =
    await getDownloadURL(storageRef);

    fileName =
    selectedFile.name;

  }

  await addDoc(

    collection(
      db,
      "chats",
      currentClient.id,
      "messages"
    ),

    {
      text,
      sender:"manager",
      createdAt:serverTimestamp(),
      fileUrl,
      fileName
    }

  );

  messageInput.value = "";
  fileInput.value = "";

  selectedFile = null;

  document.getElementById("filePreview")
  .innerHTML = "";

});

// ======================================
// PROFILE MODAL
// ======================================

profileBtn.addEventListener("click", async () => {

  if(!currentClient) return;

  document.getElementById("modalName")
  .textContent =
  currentClient.name || "Клиент";

  document.getElementById("modalPhone")
  .textContent =
  currentClient.phone || "Телефон не указан";

  document.getElementById("modalEmail")
  .textContent =
  currentClient.email || "";

  modal.style.display = "flex";

});

closeModal.addEventListener("click", () => {

  modal.style.display = "none";

});

window.addEventListener("click", (e) => {

  if(e.target === modal){

    modal.style.display = "none";

  }

});

</script>

</body>
</html>
