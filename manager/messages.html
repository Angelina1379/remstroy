<!DOCTYPE html>

<html lang="ru">

<head>


<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Календарь замеров | BuildHouse</title>

<link rel="stylesheet"
      href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet">


</head>

<body>

<div class="dashboard">


<!-- SIDEBAR -->

<aside class="sidebar">

    <div>

        <div class="logo">

            <h2>BuildHouse</h2>

            <p>Панель менеджера</p>

        </div>

        <nav class="menu">

            <a href="manager.html">
                Рабочий стол
            </a>

            <a class="active">
                Календарь
            </a>

            <a href="clients.html">
                Клиенты
            </a>

            <a href="orders.html">
                Заказы
            </a>

            <a href="messages.html">
                Сообщения
            </a>

            <a href="estimates.html">
                Сметы
            </a>

        </nav>

    </div>

</aside>

<!-- CONTENT -->

<main class="main-content">

    <div class="calendar-top">

        <div>

            <h1>
                Календарь замеров
            </h1>

            <p>
                Планирование замеров, смет и работ
            </p>

        </div>

        <button id="openModalBtn">
            + Добавить запись
        </button>

    </div>

    <div class="calendar-wrapper">

        <div id="calendar"></div>

    </div>

</main>


</div>

<!-- МОДАЛЬНОЕ ОКНО -->

<div
    id="taskModal"
    class="modal">


<div class="modal-content">

    <div class="modal-header">

        <h2>
            Новая запись
        </h2>

        <button id="closeModal">
            ✕
        </button>

    </div>

    <div class="modal-grid">

        <input
            type="text"
            id="clientName"
            placeholder="ФИО клиента">

        <input
            type="tel"
            id="clientPhone"
            placeholder="Телефон">

        <input
            type="text"
            id="clientAddress"
            placeholder="Адрес объекта">

        <select id="workType">

            <option value="">
                Выберите тип работ
            </option>

            <option value="Замер">
                Замер
            </option>

            <option value="Смета">
                Смета
            </option>

            <option value="Черновые работы">
                Черновые работы
            </option>

            <option value="Отделочные работы">
                Отделочные работы
            </option>

            <option value="Сдача объекта">
                Сдача объекта
            </option>

        </select>

        <input
            type="datetime-local"
            id="eventDate">

        <input
            type="text"
            id="manager"
            placeholder="Ответственный сотрудник">

        <textarea
            id="comment"
            rows="4"
            placeholder="Комментарий"></textarea>

    </div>

    <button id="saveTaskBtn">
        Сохранить запись
    </button>

</div>

</div>

<script src="js/calendar.js"></script>

</body>

</html>
