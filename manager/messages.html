<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сообщения | BuildHouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#ffb547;
    --primary-dark:#f39a1f;
    --accent:#ff8c42;
    --navy:#0b1220;
    --bg:#f4f7fb;
    --white:#fff;
    --border:#e6ebf2;
    --text:#1b2430;
    --muted:#7d8896;
    --shadow:0 4px 14px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
a{text-decoration:none;}
.dashboard{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:var(--navy);padding:30px 20px;display:flex;flex-direction:column;z-index:1000;}
.logo h2{color:var(--primary);font-size:28px;font-weight:900;}
.logo p{color:#8f9aad;margin-top:6px;font-size:14px;}
.menu{display:flex;flex-direction:column;gap:8px;margin-top:34px;flex-grow:1;}
.menu a{display:flex;align-items:center;gap:12px;color:#aab2c5;padding:14px 18px;border-radius:14px;transition:.25s;font-weight:500;cursor:pointer;}
.menu a .m-ic{font-size:19px;}
.menu a:hover{background:#1d2638;color:white;}
.menu .active{background:var(--primary);color:#111;font-weight:700;}
#logoutBtn{width:100%;border:none;padding:14px;border-radius:14px;background:#1d2638;color:#ff9b9b;font-weight:700;cursor:pointer;font-family:inherit;font-size:15px;margin-top:auto;}
#logoutBtn:hover{background:#26344a;}

/* MESSENGER */
.messenger{margin-left:260px;width:calc(100% - 260px);display:flex;height:100vh;}

/* CHAT LIST */
.chat-sidebar{width:340px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;}
.sidebar-top{padding:22px;border-bottom:1px solid var(--border);}
.sidebar-top .st-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.burger{display:none;background:none;border:none;font-size:26px;cursor:pointer;color:#111;}
.sidebar-top h2{font-size:22px;}
.sidebar-top input{width:100%;border:none;background:#f4f7fb;padding:14px;border-radius:14px;font-family:inherit;font-size:15px;}
.sidebar-top input:focus{outline:none;box-shadow:0 0 0 3px rgba(255,181,71,.2);}
.clients-list{flex:1;overflow-y:auto;}
.client-item{padding:16px 20px;cursor:pointer;border-bottom:1px solid #f2f4f8;transition:.2s;display:flex;align-items:center;gap:12px;}
.client-item:hover{background:#f9fbff;}
.client-item.active{background:#fff7eb;border-left:4px solid var(--primary);}
.ci-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#ffe1a2);display:flex;align-items:center;justify-content:center;font-weight:800;color:#111;flex-shrink:0;}
.ci-body{flex:1;min-width:0;}
.client-name{font-weight:600;}
.client-last{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread-dot{width:11px;height:11px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-left:auto;align-self:center;}

/* CHAT MAIN */
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;background:#eef1f6;}
.chat-header{background:white;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;min-height:80px;}
.chat-user{display:flex;align-items:center;gap:14px;}
.avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#ffe1a2);display:flex;align-items:center;justify-content:center;font-weight:800;color:#111;font-size:18px;}
.chat-user h3{font-size:17px;}
.chat-user p{color:var(--muted);font-size:13px;}
#profileBtn{border:none;background:#111;color:white;padding:11px 18px;border-radius:13px;cursor:pointer;font-weight:700;font-family:inherit;transition:.2s;}
#profileBtn:hover{transform:translateY(-2px);}

.messages-container{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px;}
.message{max-width:68%;padding:13px 17px;border-radius:18px;line-height:1.5;word-break:break-word;box-shadow:0 3px 12px rgba(0,0,0,.05);}
.message.manager{align-self:flex-end;background:var(--primary);color:#111;border-bottom-right-radius:6px;}
.message.client{align-self:flex-start;background:white;border-bottom-left-radius:6px;}
.message-time{font-size:11px;opacity:.6;margin-top:7px;text-align:right;}
.chat-image{margin-top:8px;max-width:240px;border-radius:14px;display:block;}
.file-box{margin-top:8px;background:rgba(255,255,255,.45);padding:10px;border-radius:12px;}
.file-box a{color:#1f5eff;font-weight:600;}
.message.manager .file-box a{color:#7a4a00;}
.empty-chat{margin:auto;color:#8a95a5;font-size:17px;text-align:center;}

.file-preview{background:white;padding:0 24px;color:#555;font-size:14px;}
.file-preview:not(:empty){padding:12px 24px;border-top:1px solid var(--border);}
.chat-input{background:white;border-top:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px;}
.chat-input input[type=text]{flex:1;border:none;background:#f4f7fb;border-radius:16px;padding:16px;font-family:inherit;font-size:15px;}
.chat-input input[type=text]:focus{outline:none;box-shadow:0 0 0 3px rgba(255,181,71,.2);}
.attach-btn,#voiceBtn,#sendBtn{width:52px;height:52px;border:none;border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:.25s;}
.attach-btn{background:#eef4ff;}
#voiceBtn{background:#eef4ff;}
#voiceBtn.recording{background:#ffe3e3;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
#sendBtn{background:var(--primary);}
#sendBtn:hover{background:var(--primary-dark);}
.attach-btn:hover,#voiceBtn:hover{transform:translateY(-2px);}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:9999;padding:20px;}
.modal.open{display:flex;}
.modal-content{width:100%;max-width:460px;background:white;border-radius:24px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.modal-top button{width:40px;height:40px;border:none;border-radius:12px;cursor:pointer;background:#f3f5f8;font-size:18px;}
.profile-info{text-align:center;}
.big-avatar{width:100px;height:100px;margin:auto;border-radius:50%;background:linear-gradient(135deg,var(--primary),#ffe3a5);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:#111;}
.profile-info h3{margin-top:18px;margin-bottom:14px;}
.profile-info p{margin-bottom:8px;color:var(--muted);}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;}
.overlay.show{display:block;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#d6dce5;border-radius:20px;}

.back-btn{display:none;background:none;border:none;font-size:30px;cursor:pointer;color:#111;line-height:1;padding:0 4px 0 0;}

@media(max-width:1100px){
    .sidebar{transform:translateX(-100%);transition:.3s;z-index:1100;}
    .sidebar.open{transform:translateX(0);}
    .overlay.show{display:block;}
    .messenger{margin-left:0;width:100%;}
    .burger{display:block;}
}
@media(max-width:768px){
    /* на телефоне список и чат — на весь экран, переключаются */
    .chat-sidebar{width:100%;border-right:none;height:100vh;}
    .chat-main{display:none;width:100%;height:100vh;}
    .messenger.chat-open .chat-sidebar{display:none;}
    .messenger.chat-open .chat-main{display:flex;}
    .back-btn{display:block;}
    .message{max-width:85%;}
}
</style>
</head>

<body>
<div class="dashboard">

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <h2>BuildHouse</h2>
            <p>Панель менеджера</p>
        </div>
        <nav class="menu">
            <a href="manager-panel.html"><span class="m-ic">📊</span> Главная</a>
            <a href="projects.html"><span class="m-ic">📦</span> Заказы</a>
            <a href="klients.html"><span class="m-ic">👥</span> Клиенты</a>
            <a class="active"><span class="m-ic">💬</span> Сообщения</a>
            <a href="calendar.html"><span class="m-ic">📅</span> Замеры</a>
            <a href="documents.html"><span class="m-ic">📄</span> Документы</a>
            <a href="setting.html"><span class="m-ic">⚙️</span> Настройки</a>
        </nav>
        <button id="logoutBtn">Выйти</button>
    </aside>

    <div class="overlay" id="overlay"></div>

    <div class="messenger">

        <aside class="chat-sidebar">
            <div class="sidebar-top">
                <div class="st-head">
                    <button class="burger" id="burger">☰</button>
                    <h2>Сообщения</h2>
                </div>
                <input type="text" id="searchInput" placeholder="Поиск клиента...">
            </div>
            <div id="clientsList" class="clients-list"></div>
        </aside>

        <main class="chat-main">
            <div class="chat-header">
                <div class="chat-user">
                    <button class="back-btn" id="backBtn">‹</button>
                    <div id="chatAvatar" class="avatar"></div>
                    <div>
                        <h3 id="chatUsername">Выберите чат</h3>
                        <p id="chatStatus">Ожидание...</p>
                    </div>
                </div>
                <button id="profileBtn">Профиль</button>
            </div>

            <div id="messagesContainer" class="messages-container">
                <div class="empty-chat">Выберите диалог для просмотра сообщений</div>
            </div>

            <div id="filePreview" class="file-preview"></div>

            <div class="chat-input">
                <label class="attach-btn">📎<input type="file" id="fileInput" hidden></label>
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button id="voiceBtn" title="Голосовое">🎤</button>
                <button id="sendBtn" title="Отправить">➤</button>
            </div>
        </main>

    </div>
</div>


<!-- МОДАЛКА ПРОФИЛЯ -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <div class="modal-top">
            <h2>Профиль клиента</h2>
            <button id="closeModal">✕</button>
        </div>
        <div class="profile-info">
            <div class="big-avatar" id="modalAvatar">К</div>
            <h3 id="modalName">Клиент</h3>
            <p>📞 <span id="modalPhone">—</span></p>
            <p>✉️ <span id="modalEmail">—</span></p>
        </div>
    </div>
</div>


<script type="module">
import { auth, db } from "../js/firebase.js";
import {
    collection, collectionGroup, query, orderBy, onSnapshot, addDoc, serverTimestamp, doc, getDoc, getDocs, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
    signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const $ = (id)=>document.getElementById(id);

/* ===== БЕСПЛАТНОЕ ХРАНЕНИЕ ===== */
const IMGBB_KEY="bd8a728ac270a8d6fecbd03734d77c8e"; // фото -> ImgBB
const MAX_INLINE=700*1024; // лимит для файлов/голосовых в base64 (Firestore: 1МБ на документ)

// загрузка фото в ImgBB, возвращает прямую ссылку
async function uploadToImgBB(file){
    const form=new FormData();
    form.append("key",IMGBB_KEY);
    form.append("image",file); // сам файл — ImgBB надёжно его принимает
    let res,data;
    try{
        res=await fetch("https://api.imgbb.com/1/upload",{method:"POST",body:form});
    }catch(netErr){
        throw new Error("Нет связи с сервисом фото (проверьте интернет или блокировку api.imgbb.com)");
    }
    try{ data=await res.json(); }catch(e){ throw new Error("ImgBB вернул непонятный ответ (код "+res.status+")"); }
    if(!data.success){
        const msg=data?.error?.message||("код "+res.status);
        throw new Error("ImgBB отклонил фото: "+msg);
    }
    return data.data.url;
}

function fileToBase64(file){
    return new Promise((resolve,reject)=>{
        const r=new FileReader();
        r.onload=()=>resolve(r.result);
        r.onerror=reject;
        r.readAsDataURL(file);
    });
}
const blobToBase64=fileToBase64; // работает и с Blob

const clientsList=$("clientsList");
const messagesContainer=$("messagesContainer");
const sendBtn=$("sendBtn");
const messageInput=$("messageInput");
const fileInput=$("fileInput");
const filePreview=$("filePreview");
const searchInput=$("searchInput");

let currentClient=null;
let currentChat=null;
let selectedFile=null;
let mediaRecorder=null;
let audioChunks=[];
let isRecording=false;

/* БУРГЕР */
const sidebar=$("sidebar"), overlay=$("overlay");
$("burger").addEventListener("click",()=>{sidebar.classList.add("open");overlay.classList.add("show");});
overlay.addEventListener("click",()=>{sidebar.classList.remove("open");overlay.classList.remove("show");});

/* НАЗАД к списку (мобильный) */
$("backBtn").addEventListener("click",()=>{
    document.querySelector(".messenger").classList.remove("chat-open");
});

/* LOGOUT */
$("logoutBtn").addEventListener("click",async()=>{await signOut(auth);window.location.href="../login.html";});

/* AUTH + роль */
onAuthStateChanged(auth,async(user)=>{
    if(!user){window.location.href="../login.html";return;}
    try{
        const snap=await getDoc(doc(db,"users",user.uid));
        if(snap.exists() && snap.data().role!=="manager"){window.location.href="../client-cabinet.html";return;}
    }catch(e){}
    loadClients();
});

/* СПИСОК КЛИЕНТОВ */
let clientsData=[];        // все клиенты
let lastMsgMap={};         // uid -> {text, time, sender}

function loadClients(){
    // грузим клиентов, и на каждого вешаем слушатель его последнего сообщения
    onSnapshot(collection(db,"users"),(snapshot)=>{
        clientsData=[];
        snapshot.forEach((docSnap)=>{
            const user={id:docSnap.id,...docSnap.data()};
            if(user.role==="manager")return;
            clientsData.push(user);
        });
        renderClientList();
        // для каждого клиента — следим за последним сообщением
        clientsData.forEach(u=>watchLastMessage(u.uid));
    },(error)=>{console.error("Ошибка Firestore:",error);});
}

const watched={}; // чтобы не подписываться дважды
function watchLastMessage(uid){
    if(!uid || watched[uid])return;
    watched[uid]=true;
    // следим за всеми сообщениями клиента, последнее вычисляем сами (без индексов)
    onSnapshot(collection(db,"messages",uid,"items"),(snap)=>{
        if(snap.empty)return;
        let last=null,lastTime=-1;
        snap.forEach(d=>{
            const m=d.data();
            const t=m.time?.toMillis?m.time.toMillis():(m.time?.seconds?m.time.seconds*1000:0);
            if(t>=lastTime){lastTime=t;last=m;}
        });
        if(last){
            lastMsgMap[uid]={
                text:last.text||(last.imageUrl?"📷 Фото":(last.voiceUrl?"🎤 Голосовое":(last.fileUrl?"📎 Файл":""))),
                time:lastTime,
                sender:last.sender||"client"
            };
            renderClientList();
        }
    },(e)=>{/* нет сообщений — норм */});
}

function renderClientList(){
    // сортируем: у кого свежее сообщение — выше; без сообщений — в конце
    const sorted=[...clientsData].sort((a,b)=>{
        const ta=lastMsgMap[a.uid]?.time||0;
        const tb=lastMsgMap[b.uid]?.time||0;
        return tb-ta;
    });

    clientsList.innerHTML="";
    sorted.forEach((user)=>{
        const initial=(user.name||"К").charAt(0).toUpperCase();
        const last=lastMsgMap[user.uid];
        const preview=last?(last.sender==="manager"?"Вы: "+last.text:last.text):(user.email||"");
        // непрочитано: последнее сообщение от клиента и это не открытый сейчас чат
        const unread=last && last.sender==="client" && currentChat!==user.uid;

        const item=document.createElement("div");
        item.className="client-item"+(currentChat===user.uid?" active":"");
        item.innerHTML=`
            <div class="ci-avatar">${initial}</div>
            <div class="ci-body">
                <div class="client-name">${user.name||"Клиент"}</div>
                <div class="client-last">${preview}</div>
            </div>
            ${unread?'<span class="unread-dot"></span>':""}`;
        item.addEventListener("click",()=>{
            currentClient=user;
            currentChat=user.uid||user.id;
            $("chatUsername").textContent=user.name||"Клиент";
            $("chatStatus").textContent=user.email||"";
            $("chatAvatar").textContent=initial;
            loadMessages(currentChat);
            document.querySelector(".messenger").classList.add("chat-open");
            sidebar.classList.remove("open");overlay.classList.remove("show");
            renderClientList(); // снять точку непрочитанного
        });
        clientsList.appendChild(item);
    });
}

/* ПОИСК */
searchInput?.addEventListener("input",()=>{
    const v=searchInput.value.toLowerCase();
    document.querySelectorAll(".client-item").forEach(item=>{
        item.style.display=item.textContent.toLowerCase().includes(v)?"flex":"none";
    });
});

/* СООБЩЕНИЯ */
function loadMessages(clientId){
    const messagesRef=query(collection(db,"messages",clientId,"items"),orderBy("time"));
    onSnapshot(messagesRef,(snapshot)=>{
        messagesContainer.innerHTML="";
        if(snapshot.empty){
            messagesContainer.innerHTML='<div class="empty-chat">Сообщений пока нет</div>';
            return;
        }
        const msgs=[];
        snapshot.forEach((docSnap)=>{
            const m=docSnap.data();
            let t=m.time?.toMillis?m.time.toMillis():(m.time?.seconds?m.time.seconds*1000:null);
            if(t==null)t=m.clientTime||null;
            msgs.push({m,t,ref:docSnap.ref});
        });
        msgs.sort((a,b)=>{
            const ta=a.t==null?Date.now()+1:a.t;
            const tb=b.t==null?Date.now()+1:b.t;
            return ta-tb;
        });
        msgs.forEach(({m,t,ref})=>{
            const div=document.createElement("div");
            div.className=`message ${m.sender==="manager"?"manager":"client"}`;
            let html="";
            if(m.text)html+=`<div>${m.text}</div>`;
            if(m.imageUrl)html+=`<img src="${m.imageUrl}" class="chat-image">`;
            if(m.fileUrl && !m.imageUrl)html+=`<div class="file-box"><a href="${m.fileUrl}" target="_blank">📎 ${m.fileName||"Файл"}</a></div>`;
            if(m.voiceUrl)html+=`<audio controls style="margin-top:8px;max-width:230px;"><source src="${m.voiceUrl}"></audio>`;
            const dt=t?new Date(t):new Date();
            html+=`<div class="message-time">${dt.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</div>`;
            div.innerHTML=html;
            div.addEventListener("contextmenu",async(e)=>{
                e.preventDefault();
                if(confirm("Удалить сообщение?")){
                    try{await deleteDoc(ref);}catch(err){alert("Ошибка");}
                }
            });
            messagesContainer.appendChild(div);
        });
        messagesContainer.scrollTop=messagesContainer.scrollHeight;
    });
}

/* ФАЙЛ */
fileInput?.addEventListener("change",()=>{
    selectedFile=fileInput.files[0];
    if(!selectedFile)return;
    filePreview.innerHTML=`📎 ${selectedFile.name} <span style="color:#999;cursor:pointer;" id="clearFile">✕</span>`;
    $("clearFile")?.addEventListener("click",()=>{selectedFile=null;fileInput.value="";filePreview.innerHTML="";});
});

/* ОТПРАВКА */
sendBtn?.addEventListener("click",async()=>{
    if(!currentChat){alert("Выберите клиента");return;}
    const text=messageInput.value.trim();
    if(!text && !selectedFile)return;
    let fileUrl="",imageUrl="",fileName="";
    try{
        if(selectedFile){
            const isImage=selectedFile.type.startsWith("image/");
            if(isImage){
                // фото -> ImgBB (ссылка)
                sendBtn.disabled=true;
                imageUrl=await uploadToImgBB(selectedFile);
                sendBtn.disabled=false;
            }else{
                // файл -> base64 в Firestore (с проверкой размера)
                if(selectedFile.size>MAX_INLINE){
                    alert("Файл слишком большой (макс. ~700 КБ для вложений). Фото можно больше — они идут в облако.");
                    return;
                }
                fileUrl=await fileToBase64(selectedFile); // data:... строка
                fileName=selectedFile.name;
            }
        }
        await addDoc(collection(db,"messages",currentChat,"items"),{
            text,sender:"manager",fileUrl,fileName,imageUrl,time:serverTimestamp(),clientTime:Date.now(),read:false
        });
        messageInput.value="";fileInput.value="";filePreview.innerHTML="";selectedFile=null;
    }catch(e){sendBtn.disabled=false;alert("Ошибка отправки: "+e.message);}
});

/* ENTER */
messageInput?.addEventListener("keydown",(e)=>{if(e.key==="Enter"){e.preventDefault();sendBtn.click();}});

/* ГОЛОСОВОЕ — клик старт / клик стоп */
$("voiceBtn")?.addEventListener("click",async()=>{
    if(!currentChat){alert("Выберите клиента");return;}
    if(isRecording){
        mediaRecorder.stop();
        isRecording=false;
        $("voiceBtn").classList.remove("recording");
        return;
    }
    try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder=new MediaRecorder(stream);
        audioChunks=[];
        mediaRecorder.ondataavailable=(e)=>audioChunks.push(e.data);
        mediaRecorder.onstop=async()=>{
            const blob=new Blob(audioChunks,{type:"audio/webm"});
            try{
                if(blob.size>MAX_INLINE){
                    alert("Голосовое слишком длинное (макс. ~30-40 сек). Запишите покороче.");
                }else{
                    const voiceUrl=await blobToBase64(blob);
                    await addDoc(collection(db,"messages",currentChat,"items"),{
                        sender:"manager",voiceUrl,time:serverTimestamp(),clientTime:Date.now(),read:false
                    });
                }
            }catch(e){alert("Ошибка записи: "+e.message);}
            stream.getTracks().forEach(t=>t.stop());
        };
        mediaRecorder.start();
        isRecording=true;
        $("voiceBtn").classList.add("recording");
    }catch(e){alert("Нет доступа к микрофону");}
});

/* ПРОФИЛЬ */
const profileModal=$("profileModal");
$("profileBtn")?.addEventListener("click",()=>{
    if(!currentClient){alert("Выберите клиента");return;}
    $("modalAvatar").textContent=(currentClient.name||"К").charAt(0).toUpperCase();
    $("modalName").textContent=currentClient.name||"Клиент";
    $("modalPhone").textContent=currentClient.phone||"Не указан";
    $("modalEmail").textContent=currentClient.email||"Не указан";
    profileModal.classList.add("open");
});
$("closeModal")?.addEventListener("click",()=>profileModal.classList.remove("open"));
window.addEventListener("click",(e)=>{if(e.target===profileModal)profileModal.classList.remove("open");});
</script>
