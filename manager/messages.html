<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Сообщения | BuildHouse</title>

<link rel="stylesheet"
      href="css/messages.css">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div>

            <div class="logo">

                <h2>BuildHouse</h2>

                <p>
                    Панель менеджера
                </p>

            </div>

            <nav class="menu">

<a href="manager-panel.html">
Главная
</a>

<a href="projects.html">
Заказы
</a>

<a href="klients.html">
Клиенты
</a>

<a class="active">
Сообщения
</a>

<a href="calendar.html">
Замеры
</a>

<a href="documents.html">
Документы
</a>

<a href="setting.html">
Настройки
</a>

<button id="logoutBtn">
Выйти
</button>

</nav>
  </div>
    </aside>

    <!-- MESSENGER -->

    <div class="messenger">

        <!-- СПИСОК КЛИЕНТОВ -->

        <aside class="chat-sidebar">

            <div class="sidebar-top">

                <h2>
                    Сообщения
                </h2>

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Поиск клиента..."
                >

            </div>

            <div
                id="clientsList"
                class="clients-list"
            ></div>

        </aside>

        <!-- ЧАТ -->

        <main class="chat-main">

            <div class="chat-header">

                <div class="chat-user">

                    <div
                        id="chatAvatar"
                        class="avatar"
                    ></div>

                    <div>

                        <h3 id="chatUsername">
                            Выберите чат
                        </h3>

                        <p id="chatStatus">
                            Ожидание...
                        </p>

                    </div>

                </div>

                <button id="profileBtn">
                    Профиль
                </button>

            </div>

            <div
                id="messagesContainer"
                class="messages-container"
            >

                <div class="empty-chat">

                    Выберите диалог для просмотра сообщений

                </div>

            </div>

            <div
                id="filePreview"
                class="file-preview"
            ></div>

            <div class="chat-input">

                <label class="attach-btn">

                    📎

                    <input
                        type="file"
                        id="fileInput"
                        hidden
                    >

                </label>

                <input
                    type="text"
                    id="messageInput"
                    placeholder="Введите сообщение..."
                >

                <button id="voiceBtn">
                    🎤
                </button>

                <button id="sendBtn">
                    ➤
                </button>

            </div>

        </main>

    </div>

</div>

<!-- МОДАЛЬНОЕ ОКНО ПРОФИЛЯ КЛИЕНТА -->

<div
    id="profileModal"
    class="modal"
>

    <div class="modal-content">

        <div class="modal-top">

            <h2>
                Профиль клиента
            </h2>

            <button id="closeModal">
                ✕
            </button>

        </div>

        <div class="profile-info">

            <div class="big-avatar"></div>

            <h3 id="modalName">
                Клиент
            </h3>

            <p>
                📞
                <span id="modalPhone">
                    Не указан
                </span>
            </p>

            <p>
                ✉
                <span id="modalEmail">
                    Не указан
                </span>
            </p>

        </div>

        <div class="media-list">

            <h4>
                Медиа и файлы
            </h4>

            <div id="modalMediaList">

                <div class="media-item">
                    Пока нет файлов
                </div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="js/messages.js"></script>

</body>

</html>
