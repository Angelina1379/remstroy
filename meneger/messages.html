<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Сообщения</title>

  <link rel="stylesheet" href="css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard">

  <aside class="sidebar">

    <div class="logo">
      <h2>BuildHouse</h2>
      <p>Панель менеджера</p>
    </div>

    <nav class="menu">
      <a href="manager.html">Рабочий стол</a>
      <a href="calendar.html">Календарь</a>
      <a class="active">Сообщения</a>
    </nav>

  </aside>



  <main class="messages-page">

    <div class="chat-sidebar">

      <div class="chat-search">
        <input type="text" placeholder="Поиск клиента">
      </div>



      <div class="chat-list">

        <div class="chat-contact active-chat">

          <div class="chat-avatar"></div>

          <div>
            <h4>Клиент 1</h4>
            <p>Последнее сообщение...</p>
          </div>

        </div>



        <div class="chat-contact">

          <div class="chat-avatar"></div>

          <div>
            <h4>Клиент 2</h4>
            <p>Замер подтвержден</p>
          </div>

        </div>



        <div class="chat-contact">

          <div class="chat-avatar"></div>

          <div>
            <h4>Клиент 3</h4>
            <p>Отправлена смета</p>
          </div>

        </div>

      </div>

    </div>



    <div class="chat-window">

      <div class="chat-header">

        <div class="chat-user">

          <div class="chat-avatar"></div>

          <div>
            <h3>Клиент 1</h3>
            <p>Онлайн</p>
          </div>

        </div>

      </div>



      <div class="messages-container" id="messagesContainer">

        <div class="message left-message">
          Добрый день. Когда можно провести замер?
        </div>

        <div class="message right-message">
          Завтра в 15:00 будет удобно.
        </div>

      </div>



      <div class="message-input-area">

        <label class="file-btn">
          📎
          <input type="file" id="fileInput">
        </label>

        <input
          type="text"
          id="messageInput"
          placeholder="Введите сообщение"
        >

        <button id="sendBtn">
          ➤
        </button>

      </div>

    </div>

  </main>

</div>

<script type="module" src="js/messages.js"></script>

</body>
</html>
